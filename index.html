function gradeIsSimple(grade){
  // K through 5th = simple view by default; 6th and up = full view
  var simple=['K','TK','1st','2nd','3rd','4th','5th'];
  return simple.includes(grade);
}

function GlobalThoughtPartner({isOpen,setIsOpen,context,students,sId,stu,evidence,rat,savedLPs,appr,savedCycles}){
  const [tpMessages,setTpMessages]=useState([]);
  const [tpInput,setTpInput]=useState('');
  const [tpLoading,setTpLoading]=useState(false);
  const [contextKey,setContextKey]=useState('');
  const messagesEndRef=React.useRef(null);

  // Reset conversation when context changes (different student or page)
  React.useEffect(function(){
    var newKey=(sId||'')+'|'+(context||'');
    if(newKey!==contextKey&&contextKey!==''){setTpMessages([]);}
    setContextKey(newKey);
  },[sId,context]);

  React.useEffect(function(){
    if(messagesEndRef.current)messagesEndRef.current.scrollIntoView({behavior:'smooth'});
  },[tpMessages]);

  function buildSystemPrompt(){
    var base='You are a thought partner for an educator at a Big Picture Learning school. Your role is to help the educator attend more carefully to what they are observing about a student — not to score for them, not to make recommendations, not to do the assessment work on their behalf. You surface observations, ask genuine questions, and help the educator see things they might have missed. You never suggest scores or levels directly. You speak like a knowledgeable colleague who has read the same evidence the educator has.\n\nBig Picture Learning uses six learning scaffolds: Communication, Quantitative Reasoning, Empirical Reasoning, Social Reasoning, Personal Qualities, and Knowing How to Learn. Each has indicators scored 1-4.\n\nVoice: Direct, warm, specific. Never use em dashes. Never say "it seems like" or "I notice." Respond to what is actually in front of you. Keep responses concise — 2-4 sentences unless the educator asks for more.\n\n';
    if(stu){
      var stuName=stu.name;
      base+='CURRENT STUDENT: '+stuName+'\n';
      if(appr&&appr.length>0){
        base+='APPROVED EVIDENCE ('+appr.length+' pieces):\n';
        appr.forEach(function(ev){
          var scaffoldNames=Object.keys(ev.ratings||{}).filter(function(k){return SC[k]&&Object.values(ev.ratings[k]||{}).some(function(v){return v>0;});}).map(function(k){return SC[k].name;});
          base+='- '+ev.title+' ('+ev.date+')';
          if(ev.note)base+=': '+ev.note.slice(0,120)+(ev.note.length>120?'...':'');
          if(scaffoldNames.length)base+=' ['+scaffoldNames.join(', ')+']';
          base+='\n';
        });
      } else {
        base+='No approved evidence yet for '+stuName+'.\n';
      }
      if(rat){
        var coveredScaffolds=Object.keys(SC).filter(function(sid){return rat[sid]&&Object.values(rat[sid]).some(function(v){return v>0;});});
        var missingScaffolds=Object.keys(SC).filter(function(sid){return !rat[sid]||!Object.values(rat[sid]).some(function(v){return v>0;});});
        if(coveredScaffolds.length)base+='SCAFFOLDS WITH EVIDENCE: '+coveredScaffolds.map(function(s){return SC[s].name;}).join(', ')+'\n';
        if(missingScaffolds.length)base+='SCAFFOLDS WITH NO EVIDENCE YET: '+missingScaffolds.map(function(s){return SC[s].name;}).join(', ')+'\n';
      }
      var lp=savedLPs&&savedLPs[sId];
      if(lp&&lp.lookingForward)base+='LEARNING PLAN GOAL: '+lp.lookingForward.slice(0,200)+'\n';
      // Past cycles for growth-over-time context
      var pastCycles=savedCycles&&sId?(savedCycles[sId]||[]):[];
      if(pastCycles.length>0){
        base+='\nPAST MODERATION CYCLES ('+pastCycles.length+' archived):\n';
        pastCycles.forEach(function(cyc){
          base+='=== '+cyc.name+' (archived '+cyc.date+', '+cyc.evidence.length+' entries'+(cyc.frameMode?' IBPLC Frames':'')+') ===\n';
          cyc.evidence.slice(0,10).forEach(function(ev){
            var scaffoldSummary=Object.entries(ev.ratings||{}).filter(function(e1){return Object.values(e1[1]).some(function(v){return v>0;});}).map(function(e1){var sid=e1[0],inds=e1[1];var hi=Math.max.apply(null,Object.values(inds).filter(function(v){return v>0;}));return SC[sid].name+' (peak '+hi+')';}).join(', ');
            base+='- '+ev.title+' ('+ev.date+')';
            if(scaffoldSummary)base+=': '+scaffoldSummary;
            base+='\n';
          });
          if(cyc.evidence.length>10)base+='... and '+(cyc.evidence.length-10)+' more entries\n';
        });
        base+='\nUse past cycle data to help the advisor notice growth patterns, recurring strengths, and areas that have been consistently underdeveloped across time.\n';
      }
    } else {
      base+='CURRENT VIEW: Class overview — no specific student selected.\n';
      if(students&&students.length)base+='STUDENTS IN CLASS: '+students.map(function(s){return s.name;}).join(', ')+'\n';
    }
    return base;
  }

  async function sendMessage(){
    var q=tpInput.trim();
    if(!q||tpLoading)return;
    setTpInput('');
    var newMessages=[...tpMessages,{role:'user',content:q}];
    setTpMessages(newMessages);
    setTpLoading(true);
    try{
      var systemPrompt=buildSystemPrompt();
      var apiMessages=newMessages.map(function(m){return {role:m.role,content:m.content};});
      var resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1000,
          system:systemPrompt,
          messages:apiMessages
        })
      });
      var data=await resp.json();
      var reply=data.content&&data.content[0]&&data.content[0].text?data.content[0].text:'Something went wrong. Please try again.';
      setTpMessages(function(p){return [...p,{role:'assistant',content:reply}];});
    }catch(err){
      setTpMessages(function(p){return [...p,{role:'assistant',content:'Unable to connect. Please check your connection and try again.'}];});
    }
    setTpLoading(false);
  }

  var PURPLE='#7c3aed';
  var PURPLE_LIGHT='#f5f3ff';
  var PURPLE_BORDER='#ede9fe';

  var suggestedPrompts=stu?[
    'What patterns do you see across the evidence for '+stu.name+'?',
    'Is there something in the evidence I might have missed in my assessment?',
    'What would help me understand whether '+stu.name+' is ready for more independence?',
    'What questions could I ask '+stu.name+' in our next 1-on-1?',
  ]:[
    'Which students might need more attention this week?',
    'What patterns do you notice across this group?',
    'Are there any gaps in evidence coverage I should be aware of?',
  ];

  return RC(React.Fragment,null,
    // Tab trigger
    !isOpen&&RC('div',{
      onClick:function(){setIsOpen(true);},
      title:'Open Thought Partner',
      style:{position:'fixed',right:0,top:'50%',transform:'translateY(-50%)',background:PURPLE,color:'white',borderRadius:'8px 0 0 8px',padding:'12px 6px',cursor:'pointer',zIndex:800,display:'flex',flexDirection:'column',alignItems:'center',gap:'4px',boxShadow:'-2px 2px 8px rgba(0,0,0,0.15)'}
    },
      RC('i',{className:'ti ti-message-bolt',style:{fontSize:'16px'}}),
      RC('span',{style:{fontSize:'9px',fontWeight:600,writingMode:'vertical-rl',textOrientation:'mixed',letterSpacing:'0.05em',marginTop:'2px'}},'THOUGHT PARTNER')
    ),
    // Panel
    isOpen&&RC('div',{style:{position:'fixed',right:0,top:0,bottom:0,width:'360px',background:'white',borderLeft:'0.5px solid #ede9fe',zIndex:800,display:'flex',flexDirection:'column',boxShadow:'-4px 0 16px rgba(124,58,237,0.1)'}},
      // Header
      RC('div',{style:{background:PURPLE,padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}},
        RC('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
          RC('i',{className:'ti ti-message-bolt',style:{fontSize:'16px',color:'white'}}),
          RC('div',null,
            RC('div',{style:{fontSize:'13px',fontWeight:600,color:'white'}},'Thought Partner'),
            stu&&RC('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.7)'}},stu.name)
          )
        ),
        RC('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
          tpMessages.length>0&&RC('button',{onClick:function(){setTpMessages([]);},style:{fontSize:'10px',color:'rgba(255,255,255,0.7)',background:'rgba(255,255,255,0.15)',border:'none',borderRadius:'4px',padding:'3px 7px',cursor:'pointer'}},'Clear'),
          RC('button',{onClick:function(){setIsOpen(false);},style:{background:'none',border:'none',color:'white',cursor:'pointer',fontSize:'18px',lineHeight:1,opacity:0.8}},'\u00d7')
        )
      ),
      // Context strip
      RC('div',{style:{background:PURPLE_LIGHT,borderBottom:'0.5px solid '+PURPLE_BORDER,padding:'8px 14px',fontSize:'10px',color:'#6d28d9',flexShrink:0}},
        stu
          ?'Viewing '+stu.name+' \u00b7 '+(appr&&appr.length||0)+' evidence pieces \u00b7 '+(rat?Object.keys(SC).filter(function(s){return rat[s]&&Object.values(rat[s]).some(function(v){return v>0;});}).length:0)+'/6 scaffolds covered'
          :'Class overview \u00b7 '+(students&&students.length||0)+' students'
      ),
      // Messages
      RC('div',{style:{flex:1,overflowY:'auto',padding:'14px',display:'flex',flexDirection:'column',gap:'10px'}},
        tpMessages.length===0&&RC('div',null,
          RC('div',{style:{fontSize:'12px',color:'#888',marginBottom:'10px',lineHeight:'1.6'}},
            stu
              ?'Ask anything about '+stu.name+'\'s learning. The conversation is grounded in their actual evidence and scores.'
              :'Ask anything about your class. The conversation is grounded in what\'s actually in the portfolios.'
          ),
          RC('div',{style:{fontSize:'11px',color:'#aaa',marginBottom:'6px'}},'Try asking:'),
          RC('div',{style:{display:'flex',flexDirection:'column',gap:'5px'}},
            suggestedPrompts.map(function(prompt){
              return RC('button',{key:prompt,onClick:function(){setTpInput(prompt);},style:{textAlign:'left',fontSize:'11px',color:PURPLE,background:PURPLE_LIGHT,border:'0.5px solid '+PURPLE_BORDER,borderRadius:'6px',padding:'6px 10px',cursor:'pointer',lineHeight:'1.4'}},prompt);
            })
          )

function PortfolioExporter({onClose,students,evidence,savedLPs,savedCycles,advisorStudents,advisorName}){
  var [selected,setSelected]=useState({});
  var [generating,setGenerating]=useState({});
  var [ready,setReady]=useState({});  // {stuId: htmlString}
  var [genNarrative,setGenNarrative]=useState(true);
  var BPL='#0A7A3E';

  function toggleStu(id){setSelected(function(p){var n=Object.assign({},p);if(n[id])delete n[id];else n[id]=true;return n;});}
  function selectAll(){var n={};advisorStudents.forEach(function(s){n[s.id]=true;});setSelected(n);}
  function clearAll(){setSelected({});}

  function heatMapTableHTML(studentId,useFrames){
    var activeInd=useFrames?F_IND:IND;
    var activeCaps=useFrames?F_CAPS:CAPS;
    var activeCells=useFrames?F_CELLS:CELLS;
    var maxLv=useFrames?5:4;
    var appr=evidence.filter(function(ev){return ev.studentId===studentId&&ev.status==='approved';});

    // Build freq map
    var freq={};
    appr.forEach(function(ev){
      Object.entries(ev.ratings||{}).forEach(function(e1){
        var sid=e1[0],inds=e1[1];
        if(!activeInd[sid])return;
        activeInd[sid].forEach(function(ind,ci){
          var level=inds[ind]||0;
          if(level>0){
            var key=sid+'-'+ci+'-'+level;
            if(!freq[key])freq[key]=[];
            freq[key].push(ev.title);
          }
        });
      });
    });

    var tables=Object.keys(SC).map(function(sid){
      var s=SC[sid];
      var inds=activeInd[sid]||[];
      var caps=activeCaps[sid]||[];
      var cells=activeCells[sid]||{};
      var levels=[];for(var l=maxLv;l>=1;l--)levels.push(l);

      var headerRow='<tr><td style="width:50px;background:'+s.h6+';border:none;"></td>'
        +inds.map(function(ind,i){return '<td style="background:'+s.h6+';color:white;font-size:9px;font-weight:600;padding:4px 5px;border:0.5px solid '+s.h8+';text-align:center;vertical-align:bottom;min-width:80px;">'+ind+'</td>';}).join('')+'</tr>';

      var capsRow='<tr><td style="background:'+s.h6+';border:none;"></td>'
        +caps.map(function(cap){return '<td colspan="'+cap.c+'" style="background:'+s.h6+';color:white;font-size:8px;padding:3px 5px;border:0.5px solid '+s.h8+';text-align:center;font-weight:500;">'+cap.l+'</td>';}).join('')+'</tr>';

      var dataRows=levels.map(function(lv){
        return '<tr><td style="font-size:11px;font-weight:600;color:'+s.h6+';padding:5px 6px;border:0.5px solid #e0e0e0;text-align:center;vertical-align:top;">'+lv+'</td>'
          +inds.map(function(ind,ci){
            var key=sid+'-'+ci+'-'+lv;
            var evList=freq[key]||[];
            var cellText=(cells[lv]||[])[ci]||'';
            var bg=evList.length>0?(evList.length>=3?s.h6:evList.length===2?s.h2:s.h1):'white';
            var textCol=evList.length>=3?'white':s.h8;
            return '<td style="background:'+bg+';padding:5px 6px;border:0.5px solid #e0e0e0;font-size:9px;vertical-align:top;color:'+(evList.length>0?textCol:'#ccc')+';">'
              +(evList.length>0?'<div style="font-weight:600;margin-bottom:3px;color:'+(evList.length>=3?'white':s.h8)+';">'+evList.length+' piece'+(evList.length>1?'s':'')+'</div>':'')
              +'<div style="opacity:0.85;">'+cellText+'</div>'
              +(evList.length>0?'<div style="margin-top:4px;font-size:8px;opacity:0.8;">'+evList.map(function(t){return '\u2022 '+t;}).join('<br>')+'</div>':'')
              +'</td>';
          }).join('')+'</tr>';
      }).join('');

      var nyeRow='<tr style="border-top:2px solid '+s.h1+'">'
        +'<td style="font-size:9px;font-style:italic;color:#aaa;padding:5px 6px;text-align:center;border:0.5px solid #e0e0e0;">Not yet</td>'
        +inds.map(function(){return '<td style="font-size:9px;font-style:italic;color:#bbb;text-align:center;padding:5px 6px;border:0.5px solid #e0e0e0;">Not yet evident</td>';}).join('')+'</tr>';

      return '<div style="margin-bottom:28px;page-break-inside:avoid;">'
        +'<div style="font-size:13px;font-weight:700;color:'+s.h8+';margin-bottom:8px;display:flex;align-items:center;gap:6px;">'
        +'<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+s.h6+';"></span>'+s.name+'</div>'
        +'<div style="overflow-x:auto;">'
        +'<table style="border-collapse:collapse;width:100%;font-family:system-ui,sans-serif;">'
        +capsRow+headerRow+dataRows+nyeRow
        +'</table></div></div>';
    }).join('');

    return tables;
  }

  function growthChartHTML(studentId,useFrames){
    var activeInd=useFrames?F_IND:IND;
    var appr=evidence.filter(function(ev){return ev.studentId===studentId&&ev.status==='approved';});
    var rat=avgRatings(studentId,appr);
    var maxLv=useFrames?5:4;

    return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
      +Object.keys(SC).map(function(sid){
        var s=SC[sid];
        var inds=activeInd[sid]||[];
        var hasEv=appr.some(function(ev){return ev.ratings&&ev.ratings[sid]&&Object.values(ev.ratings[sid]).some(function(v){return v>0;});});
        return '<div style="background:'+s.h5+';border-radius:10px;border:0.5px solid '+s.h1+';padding:10px 12px;">'
          +'<div style="font-size:12px;font-weight:700;color:'+s.h8+';margin-bottom:8px;">'+s.name+'</div>'
          +(hasEv
            ?inds.slice(0,6).map(function(ind){
              var avg=rat[sid]&&rat[sid][ind]?rat[sid][ind]:0;
              var filled=Math.round(avg);
              var dots=Array.from({length:maxLv},function(_,i){return '<span style="display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:2px;background:'+(filled>i?s.h6:'#e8e8e8')+';"></span>';}).join('');
              return '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">'
                +'<span style="font-size:9px;color:'+s.h8+';flex:1;line-height:1.3;opacity:0.85;">'+ind+'</span>'
                +'<span>'+dots+'</span></div>';
            }).join('')
            :'<div style="font-size:11px;color:'+s.h6+';font-style:italic;opacity:0.7;">Not yet captured.</div>'
          )
          +'</div>';
      }).join('')
      +'</div>';
  }

  function evidenceListHTML(studentId){
    var appr=evidence.filter(function(ev){return ev.studentId===studentId&&ev.status==='approved';});
    if(!appr.length)return '<p style="color:#aaa;font-style:italic;">No approved evidence on file.</p>';
    return appr.map(function(ev){
      var domains=Object.entries(ev.ratings||{}).filter(function(e1){return Object.values(e1[1]).some(function(v){return v>0;});});
      return '<div style="border:1px solid #e0e0e0;border-radius:8px;padding:12px 14px;margin-bottom:10px;page-break-inside:avoid;">'
        +'<div style="font-weight:600;font-size:13px;margin-bottom:3px;">'+ev.title+'</div>'
        +'<div style="font-size:11px;color:#888;margin-bottom:6px;">'+ev.date+(ev.submittedBy==='student'?' &bull; student submission':' &bull; educator')+(ev.type?' &bull; '+ev.type:'')+'</div>'
        +(ev.note?'<div style="font-size:12px;color:#444;line-height:1.6;padding-left:10px;border-left:2.5px solid #e0e0e0;margin-bottom:8px;">'+ev.note+'</div>':'')
        +(domains.length?'<div style="font-size:11px;color:#555;">'
          +domains.map(function(e1){var sid=e1[0],inds=e1[1];var s=SC[sid];var scored=Object.entries(inds).filter(function(e2){return e2[1]>0;});return '<span style="display:inline-block;background:'+s.h5+';border:0.5px solid '+s.h2+';border-radius:4px;padding:2px 7px;margin-right:5px;margin-bottom:3px;color:'+s.h8+';"><b>'+s.short+'</b>: '+scored.map(function(e2){return e2[0]+' ('+e2[1]+')';}).join(', ')+'</span>';}).join('')
          +'</div>':'')
        +'</div>';
    }).join('');
  }

  function lpHTML(studentId){
    var lp=savedLPs[studentId];
    if(!lp)return '<p style="color:#aaa;font-style:italic;">No Learning Plan on file.</p>';
    var rows=[
      {label:'Cycle',val:lp.cycle},
      {label:'Date',val:lp.date},
      {label:'Student Interests and Goals',val:lp.lookingForward},
      {label:'Educator Input',val:lp.advisorReflection},
      {label:'Parent/Guardian Input',val:lp.parentInput},
      {label:'BP Living Goal',val:lp.bpLivingGoal},
    ].filter(function(r){return r.val&&r.val.trim();});
    var goalRows='';
    if(lp.scaffoldGoals){
      Object.entries(lp.scaffoldGoals).forEach(function(e1){
        var sid=e1[0],g=e1[1];
        if(g&&(g.text||g.indicators&&g.indicators.length)){
          var s=SC[sid];
          goalRows+='<div style="margin-bottom:8px;padding:8px 10px;background:'+s.h5+';border-left:3px solid '+s.h6+';border-radius:4px;">'
            +'<div style="font-weight:600;font-size:12px;color:'+s.h8+';margin-bottom:4px;">'+s.name+'</div>'
            +(g.text?'<div style="font-size:12px;color:#444;margin-bottom:4px;">'+g.text+'</div>':'')
            +(g.indicators&&g.indicators.length?'<div style="font-size:11px;color:'+s.h8+';">Focus: '+g.indicators.join(', ')+'</div>':'')

        +'<div style="font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;">'+r.label+'</div>'

  }

  async function generateForStudent(stuId){
    var stu=students.find(function(s){return s.id===stuId;});
    if(!stu)return;
    setGenerating(function(p){return Object.assign({},p,{[stuId]:true});});

    var useFrames=!!(stu&&stu.useFrames);
    var appr=evidence.filter(function(ev){return ev.studentId===stuId&&ev.status==='approved';});
    var rat=avgRatings(stuId,appr);

    // Generate AI narrative if enabled
    var narrative='';
    if(genNarrative&&appr.length>0){
      try{
        var evSummary=appr.map(function(ev){
          var s=Object.keys(ev.ratings||{}).filter(function(k){return SC[k]&&Object.values(ev.ratings[k]||{}).some(function(v){return v>0;});}).map(function(k){return SC[k].name;}).join(', ');

          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
        });
        var data=await resp.json();
        var txt=data.content&&data.content[0]&&data.content[0].text?data.content[0].text:'';
        var clean=txt.replace(/```json|```/g,'').trim();
        var parsed=JSON.parse(clean);
        narrative=parsed.glows&&parsed.grows&&parsed.goals

            }).join('')+'</div>':'';
      }catch(e){narrative='';}
    }

    var col=SCOLS[stu.colorIdx%SCOLS.length];
    var html='<!DOCTYPE html><html><head><meta charset="UTF-8">'
      +'<title>Portfolio — '+stu.name+'</title>'
      +'<style>'
      +'*{box-sizing:border-box;margin:0;padding:0;}'

      +'body{padding:16px;max-width:100%;}'

      +'}'

function CycleViewer({cycle,stu,onClose}){
  var [activeTab,setActiveTab]=useState('evidence');
  var BPL='#0A7A3E';
  var col=SCOLS[stu.colorIdx%SCOLS.length];
  var activeInd=cycle.frameMode?F_IND:IND;
  var activeSC=SC;

  function printCycle(){
    var w=window.open('','_blank');
    if(!w)return;
    var rows=cycle.evidence.map(function(ev){
      var ratingLines=[];
      Object.entries(ev.ratings||{}).forEach(function(e1){
        var sid=e1[0],inds=e1[1];
        var scored=Object.entries(inds).filter(function(e2){return e2[1]>0;});
        if(scored.length)ratingLines.push('<b>'+SC[sid].name+':</b> '+scored.map(function(e2){return e2[0]+' ('+e2[1]+')';}).join(', '));
      });
      return '<div style="margin-bottom:18px;padding:14px;border:1px solid #e0e0e0;border-radius:8px;">'
        +'<div style="font-weight:600;font-size:14px;margin-bottom:4px;">'+ev.title+'</div>'
        +'<div style="font-size:12px;color:#666;margin-bottom:8px;">'+ev.date+(ev.note?' &mdash; '+ev.note:'')+'</div>'
        +(ratingLines.length?'<div style="font-size:12px;line-height:1.8;">'+ratingLines.join('<br>')+'</div>':'')
        +'</div>';
    }).join('');

    var snapRows=Object.keys(activeSC).map(function(sid){
      var snap=cycle.heatSnap[sid]||{};
      var inds=activeInd[sid]||[];
      if(!Object.keys(snap).length)return '';
      return '<div style="margin-bottom:14px;">'
        +'<div style="font-weight:600;color:'+SC[sid].h8+';margin-bottom:6px;">'+SC[sid].name+'</div>'
        +inds.map(function(ind){
          var entries=snap[ind]||[];
          if(!entries.length)return '';
          var avg=(entries.reduce(function(a,b){return a+b.level;},0)/entries.length).toFixed(1);
          return '<div style="font-size:12px;padding:4px 0;border-bottom:1px solid #f0f0f0;">'
            +'<b>'+ind+'</b>: avg '+avg+' across '+entries.length+' piece'+(entries.length>1?'s':'')
            +' ('+entries.map(function(e){return e.title+' ['+e.level+']';}).join(', ')+')</div>';
        }).join('')
        +'</div>';
    }).join('');

    w.document.write('<!DOCTYPE html><html><head><title>'+cycle.name+' — '+stu.name+'</title>'
      +'<style>body{font-family:system-ui,sans-serif;padding:32px;max-width:750px;margin:0 auto;color:#111;}'
      +'h1{font-size:20px;margin-bottom:4px;}h2{font-size:15px;color:#555;font-weight:500;margin:24px 0 12px;border-bottom:1px solid #e0e0e0;padding-bottom:6px;}'
      +'@media print{body{padding:16px;}}</style></head><body>'
      +'<h1>'+cycle.name+' &mdash; '+stu.name+'</h1>'
      +'<div style="font-size:13px;color:#888;margin-bottom:24px;">Archived '+cycle.date+' &bull; '+cycle.evidence.length+' evidence entries'+(cycle.frameMode?' &bull; IBPLC Frames':'')+'</div>'
      +'<h2>Evidence</h2>'+rows
      +'<h2>Scaffold Snapshot</h2>'+snapRows
      +'<script>window.print();<\/script>'
      +'</body></html>');
    w.document.close();
  }

  return RC('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:1500,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}},
    RC('div',{style:{background:'white',borderRadius:'16px',maxWidth:'680px',width:'100%',maxHeight:'92vh',display:'flex',flexDirection:'column',boxShadow:'0 8px 40px rgba(0,0,0,0.2)'}},
      // Header
      RC('div',{style:{padding:'18px 22px 14px',borderBottom:'0.5px solid #e0e0e0',flexShrink:0,display:'flex',alignItems:'center',gap:'12px'}},
        RC('div',{style:{width:'34px',height:'34px',borderRadius:'50%',background:'#f0f7f4',border:'1.5px solid #a5d6c5',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},
          RC('i',{className:'ti ti-archive',style:{fontSize:'16px',color:BPL}})
        ),
        RC('div',{style:{flex:1}},
          RC('div',{style:{fontSize:'15px',fontWeight:600,color:'#111'}},cycle.name),
          RC('div',{style:{fontSize:'12px',color:'#888'}},stu.name+' \u00b7 archived '+cycle.date+' \u00b7 '+cycle.evidence.length+' entries'+(cycle.frameMode?' \u00b7 IBPLC Frames':''))
        ),
        RC('button',{onClick:printCycle,title:'Print / Save as PDF',style:{display:'flex',alignItems:'center',gap:'4px',fontSize:'12px',background:'#f5f5f5',border:'0.5px solid #ddd',borderRadius:'8px',padding:'6px 12px',cursor:'pointer',color:'#555',marginRight:'6px'}},
          RC('i',{className:'ti ti-printer',style:{fontSize:'13px'}}),'Print / PDF'
        ),
        RC('button',{onClick:onClose,style:{background:'none',border:'none',cursor:'pointer',color:'#aaa',padding:'4px',borderRadius:'6px',display:'flex',alignItems:'center'}},
          RC('i',{className:'ti ti-x',style:{fontSize:'18px'}})
        )
      ),
      // Tabs
      RC('div',{style:{display:'flex',borderBottom:'0.5px solid #e0e0e0',flexShrink:0}},
        [['evidence','Evidence','ti-files'],['snapshot','Scaffold Snapshot','ti-chart-bar']].map(function(t){
          var isA=activeTab===t[0];
          return RC('button',{key:t[0],onClick:function(){setActiveTab(t[0]);},style:{flex:1,padding:'10px 8px',fontSize:'12px',fontWeight:isA?600:400,color:isA?BPL:'#888',background:'transparent',border:'none',borderBottom:isA?'2px solid '+BPL:'2px solid transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'5px'}},
            RC('i',{className:'ti '+t[2],style:{fontSize:'13px'}}),t[1]
          );
        })
      ),
      // Content
      RC('div',{style:{flex:1,overflowY:'auto',padding:'16px 20px'}},
        activeTab==='evidence'&&RC('div',null,
          cycle.evidence.length===0&&RC('div',{style:{color:'#aaa',fontSize:'13px',textAlign:'center',paddingTop:'24px'}},'No evidence in this cycle.'),
          cycle.evidence.map(function(ev){
            var scoredDomains=Object.entries(ev.ratings||{}).filter(function(e1){return Object.values(e1[1]).some(function(v){return v>0;});});
            return RC('div',{key:ev.id,style:{background:'#fafafa',border:'0.5px solid #e0e0e0',borderRadius:'10px',padding:'12px 14px',marginBottom:'10px'}},
              RC('div',{style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'8px',marginBottom:ev.note?'8px':'0'}},
                RC('div',{style:{flex:1}},
                  RC('div',{style:{fontSize:'13px',fontWeight:600,color:'#111',marginBottom:'2px'}},ev.title),
                  RC('div',{style:{fontSize:'11px',color:'#888'}},ev.date+(ev.submittedBy==='student'?' \u00b7 student':' \u00b7 educator')+(ev.type?(' \u00b7 '+ev.type):''))
                )
              ),
              ev.note&&RC('div',{style:{fontSize:'12px',color:'#555',lineHeight:'1.6',marginBottom:'8px',borderLeft:'2.5px solid #e0e0e0',paddingLeft:'10px'}},ev.note),
              scoredDomains.length>0&&RC('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px',marginTop:'8px'}},
                scoredDomains.map(function(e1){
                  var sid=e1[0],inds=e1[1];
                  var s=SC[sid];
                  var scored=Object.entries(inds).filter(function(e2){return e2[1]>0;});
                  return RC('div',{key:sid,style:{background:s.h5,border:'0.5px solid '+s.h2,borderRadius:'6px',padding:'4px 8px',fontSize:'11px',color:s.h8}},
                    RC('span',{style:{fontWeight:600}},s.short),': ',
                    scored.map(function(e2){return e2[0]+' ('+e2[1]+')';}).join(', ')
                  );
                })
              )
            );
          })
        ),
        activeTab==='snapshot'&&RC('div',null,
          Object.keys(activeSC).map(function(sid){
            var snap=cycle.heatSnap[sid]||{};
            var inds=activeInd[sid]||[];
            var scored=inds.filter(function(ind){return snap[ind]&&snap[ind].length>0;});
            if(!scored.length)return null;
            var s=SC[sid];
            return RC('div',{key:sid,style:{marginBottom:'18px'}},
              RC('div',{style:{display:'flex',alignItems:'center',gap:'7px',marginBottom:'8px'}},
                RC('div',{style:{width:'10px',height:'10px',borderRadius:'50%',background:s.h6,flexShrink:0}}),
                RC('div',{style:{fontSize:'13px',fontWeight:600,color:s.h8}}),s.name
              ),
              scored.map(function(ind){
                var entries=snap[ind]||[];
                var avg=entries.reduce(function(a,b){return a+b.level;},0)/entries.length;
                var barW=Math.round((avg/(cycle.frameMode?5:4))*100);
                return RC('div',{key:ind,style:{marginBottom:'8px'}},
                  RC('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'3px'}},
                    RC('span',{style:{fontSize:'12px',color:'#333'}},ind),
                    RC('span',{style:{fontSize:'11px',fontWeight:600,color:s.h8}},avg.toFixed(1))
                  ),
                  RC('div',{style:{height:'6px',borderRadius:'3px',background:'#e8e8e8',overflow:'hidden'}},
                    RC('div',{style:{height:'100%',width:barW+'%',background:s.h6,borderRadius:'3px',transition:'width 0.3s'}})
                  ),
                  RC('div',{style:{marginTop:'4px',fontSize:'11px',color:'#888'}},
                    entries.map(function(e){return RC('span',{key:e.evId,style:{display:'inline-block',marginRight:'8px',marginBottom:'2px'}},e.title+' ['+e.level+']');})
                  )
                );
              })
            );
          })
        )
      )
    )
  );
}


function CycleArchiveModal({onClose,students,evidence,savedCycles,setSavedCycles,setEvidence,scopeStudentId,advisorStudents}){
  var [cycleName,setCycleName]=useState('');
  var [scope,setScope]=useState(scopeStudentId?'student':'class');
  var [selectMode,setSelectMode]=useState(null); // null=not chosen, 'all', 'select'
  var [selectedIds,setSelectedIds]=useState({});
  var [step,setStep]=useState(1); // 1=name+scope, 2=showcase select, 3=confirm
  var [showcaseMode,setShowcaseMode]=useState(null);
  var [wpMode,setWpMode]=useState(null);

  var targetStudents=scope==='student'
    ?(scopeStudentId?[students.find(function(s){return s.id===scopeStudentId;})]:[])
    :advisorStudents;
  targetStudents=targetStudents.filter(Boolean);

  var allEvidence=evidence.filter(function(ev){
    return targetStudents.some(function(s){return s.id===ev.studentId;})&&ev.status==='approved';
  });

  function toggleId(id){setSelectedIds(function(p){var n=Object.assign({},p);if(n[id])delete n[id];else n[id]=true;return n;});}

  function buildHeatSnap(evList,stu){
    var snap={};
    var useFrames=stu&&stu.useFrames;
    evList.forEach(function(ev){
      Object.entries(ev.ratings||{}).forEach(function(e1){
        var sid=e1[0],inds=e1[1];
        var activeInd=useFrames?(F_IND[sid]||IND[sid]):(IND[sid]||[]);
        if(!snap[sid])snap[sid]={};
        activeInd.forEach(function(ind){
          var v=inds[ind]||0;
          if(v>0){
            if(!snap[sid][ind])snap[sid][ind]=[];
            snap[sid][ind].push({evId:ev.id,title:ev.title,date:ev.date,level:v});
          }
        });
      });
    });
    return snap;
  }

  function doArchive(){
    if(!cycleName.trim())return;
    var toArchiveIds={};
    if(showcaseMode==='all'&&wpMode==='all'){
      allEvidence.forEach(function(ev){toArchiveIds[ev.id]=true;});
    } else {
      Object.keys(selectedIds).forEach(function(id){toArchiveIds[id]=true;});
    }

    var newCycles=Object.assign({},savedCycles);
    targetStudents.forEach(function(stu){
      var stuEv=evidence.filter(function(ev){return ev.studentId===stu.id&&toArchiveIds[ev.id];});
      if(!stuEv.length)return;
      var cycle={
        id:'cyc-'+Date.now()+'-'+stu.id,
        name:cycleName.trim(),
        date:new Date().toISOString().split('T')[0],
        evidence:stuEv,
        frameMode:!!(stu&&stu.useFrames),
        heatSnap:buildHeatSnap(stuEv,stu)
      };
      if(!newCycles[stu.id])newCycles[stu.id]=[];
      newCycles[stu.id]=[cycle,...newCycles[stu.id]];
    });
    setSavedCycles(newCycles);
    // Remove archived evidence from active
    var archiveSet=toArchiveIds;
    setEvidence(function(prev){return prev.filter(function(ev){return !archiveSet[ev.id];});});
    onClose();
  }

  var LS={fontSize:'12px',fontWeight:500,color:'#444',display:'block',marginBottom:'5px'};
  var BPL='#0A7A3E';

  if(step===1){
    return RC('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}},
      RC('div',{style:{background:'white',borderRadius:'16px',padding:'28px 28px 24px',maxWidth:'480px',width:'100%',boxShadow:'0 8px 40px rgba(0,0,0,0.18)'}},
        RC('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'20px'}},
          RC('div',{style:{width:'36px',height:'36px',borderRadius:'50%',background:'#f0f7f4',border:'1.5px solid #a5d6c5',display:'flex',alignItems:'center',justifyContent:'center'}},
            RC('i',{className:'ti ti-archive',style:{fontSize:'18px',color:BPL}})
          ),
          RC('div',null,
            RC('div',{style:{fontSize:'16px',fontWeight:600,color:'#111'}},'Complete Moderation Cycle'),
            RC('div',{style:{fontSize:'12px',color:'#888'}},'Archive evidence and start fresh')
          )
        ),
        RC('div',{style:{marginBottom:'16px'}},
          RC('label',{style:LS},'Cycle name'),
          RC('input',{value:cycleName,onChange:function(e){setCycleName(e.target.value);},placeholder:'e.g. Fall 2026, Spring 2026',autoFocus:true,style:{width:'100%',boxSizing:'border-box',fontSize:'14px',padding:'9px 12px',border:'0.5px solid #ddd',borderRadius:'8px',outline:'none'}})
        ),
        scopeStudentId&&RC('div',{style:{marginBottom:'16px'}},
          RC('label',{style:LS},'Archive scope'),
          RC('div',{style:{display:'flex',gap:'8px'}},

  // ---- PROGRESS REPORT VIEW ----

                    })

                })
              ),
              RC('div',{style:{display:'flex',flexDirection:'column',alignItems:'flex-start',gap:'14px'}},RC('button',{onClick:generateReportAI,style:{padding:'10px 28px',fontSize:'13px',fontWeight:500,background:SC.comm.h5,border:'0.5px solid '+SC.comm.h6,color:SC.comm.h8,borderRadius:'8px',display:'flex',alignItems:'center',gap:'6px'}},RC('i',{className:'ti ti-sparkles',style:{fontSize:'15px'}}),'Generate report from evidence'),RC('div',{style:{display:'flex',alignItems:'center',gap:'8px',width:'380px'}},RC('div',{style:{flex:1,height:'0.5px',background:'#ddd'}}),RC('span',{style:{fontSize:'11px',color:'#bbb',padding:'0 8px',whiteSpace:'nowrap'}},'no AI account? try this instead'),RC('div',{style:{flex:1,height:'0.5px',background:'#ddd'}})),RC('div',null,RC('button',{onClick:copyPrompt,style:{display:'flex',alignItems:'center',gap:'6px',fontSize:'13px',fontWeight:500,background:promptCopied?'#E1F5EE':'#f9f9f9',border:'0.5px solid '+(promptCopied?BPL:'#ddd'),color:promptCopied?'#0A7A3E':'#444',borderRadius:'8px',padding:'10px 20px',transition:'all 0.2s'}},RC('i',{className:'ti ti-clipboard'+(promptCopied?'-check':''),style:{fontSize:'15px',color:promptCopied?BPL:'#666'}}),promptCopied?'Copied! Paste into Claude.ai or ChatGPT':'Copy prompt for Claude.ai or ChatGPT'),RC('div',{style:{fontSize:'11px',color:'#999',marginTop:'5px',lineHeight:'1.5'}},'Paste into any AI tool to generate a report. Claude.ai has a free plan.'),RC('div',{style:{fontSize:'11px',color:'#bbb',marginTop:'2px'}},'Includes all evidence, scaffold scores, and Learning Plan goals.')))

    );
  }

  return null;
