<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#111;}
button{font-family:inherit;border:0.5px solid #ccc;background:#fff;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:#111;}
button:hover{background:#f0f0f0;}
input,textarea,select{font-family:inherit;font-size:13px;padding:7px 10px;border:0.5px solid #ccc;border-radius:8px;background:#fff;color:#111;width:100%;}
input:focus,textarea:focus,select:focus{outline:none;border-color:#2BB373;}
.grid-wrap{overflow-x:auto;border-radius:8px;border:0.5px solid #e0e0e0;}
table{border-collapse:collapse;}
td{vertical-align:top;padding:7px 9px;border:0.5px solid #e0e0e0;font-size:11px;line-height:1.45;}
.lbl{width:72px;min-width:72px;font-size:10px;font-weight:500;text-align:right;background:#fafafa;color:#888;position:sticky;left:0;z-index:2;}
.indc{width:128px;min-width:128px;font-weight:500;font-size:10px;text-align:center;padding:7px 6px;}
.capc{font-weight:500;font-size:10px;text-align:center;padding:5px;letter-spacing:0.03em;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
</style>

    4:['I can choose from a range of communication forms deliberately, picking what fits my purpose, audience, and context.','I can choose techniques on purpose (like structure, word choice, or tone) to make my communication land the way I want it to.','I can adjust how I\'m communicating in the moment based on how my audience responds, and revise my work based on feedback.','I can share my ideas with enough clarity and detail that others can follow, and adjust when something isn\'t landing.','I can use vocabulary, symbols, or forms that go with my area of interest accurately, and explain what they mean when others need it.','I can stay engaged in discussions by listening carefully, building on what others say, and taking seriously perspectives that are different from mine.','I can present my ideas clearly and purposefully, adjust for my audience, and give credit to the sources and people that shaped my thinking.','I can work with others to build shared understanding.'],
    3:['I can choose a format for sharing my ideas that I think works (like writing, speaking, digital tools, visual art, or hands-on creations).','I can use visuals, headings, poetry, or other structures to fit my audience and purpose.','I can change my tone or format based on who I\'m talking to, what I\'m trying to do, and the situation.','I can share my ideas clearly and check that others understand what I mean.','I can pick words that fit who I\'m talking to and what the situation is.','I can participate in discussions by asking clarifying and probing questions to deepen understanding.','I can share my ideas clearly for a group and make clear which ideas are mine and which came from others.','I can work with classmates and adults to develop ideas, share credit, and learn from each other.'],
    2:['I can use different ways to share my ideas (speaking, writing, drawing, or showing).','I can organize my ideas clearly and add details that help people understand what I mean.','I can notice when a situation calls for a different way of communicating.','I can communicate clearly so that others can understand what I mean.','I can choose words, symbols, or other forms that say exactly what I mean, especially in areas I know well.','I can connect my ideas to what someone else has said and ask questions to deepen my understanding.','I can share or perform my ideas and stories, and say when an idea came from someone else.','I can have conversations and play with others to build friendships.'],
    1:['I can name different ways people share what they think or need.','I can use different ways to share my ideas and experiences.','I can try to clarify when others don\'t understand what I mean.','I can use the way I communicate best to share what I think or need.','I can use new words, symbols, gestures, or other ways to show what I mean.','I can use play, pretend, and conversation to explore ideas.','I can share thoughts or tell stories in different settings at school, at home, or with friends.','I can connect with friends and adults through play and everyday conversations.'],

  stella:{glows:"Stella's care for animals and the environment is remarkable and completely authentic. Her drawing of shelter dogs showed nuanced empathy -- she used color deliberately to distinguish sad dogs from happy ones and explained each dog by name. The fish tank responsibility reveals a student who takes commitments seriously and helps others understand them. She connected peers naturally and patiently when a new student needed guidance.\\n\\nStellas question during the ocean trash circle time -- she was the first hand up, and she connected the image to her own experience at the beach -- shows a student already making links between the world she observes and the feelings that observation generates. That is the beginning of genuine inquiry.",grows:"Stella is finding her voice in larger group settings. Earlier in the year she shared primarily in small groups. Her unprompted contribution during whole-class circle time, where she named what the fish must be feeling and asked what we could do, marks a real step in Presents ideas at Level 1. She is beginning to understand that her observations are worth sharing beyond her immediate circle.\\n\\nHer block center animal shelter project showed growth in planning and explaining. She spent extended focused time on the design and explained her choices to a friend in a way that showed she had a clear vision in her head that she wanted to communicate.",goals:"The most natural next step for Stella is connecting her caring instincts to a simple concrete action. She already asks why and what can we do -- the goal is taking a first step. A class project around shelter animals, or a drawing series she shares with the community, would build on exactly what she already loves.\\n\\nIn the coming cycle, supporting her in asking more observational questions will help her grow as an inquirer. When she says the fish feel scared, following that with what makes you think that and what would you do to find out more gently introduces ER habits in language she already uses."},
  tyber:{glows:"Tyber's LEGO bridge challenge showed genuine engineering thinking -- he did not just build, he tested, analyzed failure, and rebuilt with a hypothesis about what would work better. That cycle of try, observe, revise is exactly the pattern we want to encourage, and it came entirely from him.\\n\\nHis comic book, The Brick Knight, is a genuine creative achievement for a second grader. The story had structure, the hero had a clear motivation, and he read it to the class with confidence. He answered questions about his design choices thoughtfully, showing that the decisions were intentional, not accidental.",grows:"Tyber's growth this semester is most visible in his willingness to share. At the start of the year he was reluctant to present work in front of the group. Reading his comic book aloud and fielding questions was a significant step. He made eye contact, answered questions, and seemed genuinely pleased by his classmates' responses.\\n\\nHis soccer season evidence shows growth in social awareness that does not always show up in his individual work. Comforting a teammate after a loss is evidence of someone beginning to notice and respond to others' emotional states -- a real development in Understands others.",goals:"The focus for the coming cycle is helping Tyber share his internal process with others. He has rich ideas that he works out privately -- in his LEGO city, in his comic book -- and the next step is bringing others into that process earlier rather than only showing finished work.\\n\\nConnecting his building work to the math we do in class is a natural next step for QR. He already uses measurement and comparison; making that thinking explicit and documented will strengthen both his mathematical fluency and his ability to explain his reasoning to others."},
  megan:{glows:"Megan's harp performance at the spring concert was a standout moment. She performed from memory, introduced the piece with genuine warmth, and maintained presence with the audience throughout. Presents ideas at Level 3 is accurate -- she is communicating with intention, not just technically executing.\\n\\nHer animal shelter awareness poster demonstrates real persuasive thinking. She chose her statistics, her images, and her language deliberately to move an audience toward action. That it generated comments from students and parents in the hallway is evidence that it worked.",grows:"Megan's most significant growth this cycle is visible in the Socratic seminar. She changed her position in response to a classmate's argument -- a move that requires real intellectual humility and genuine listening. That is growth in Constructs understanding that is worth naming explicitly with her.\\n\\nHer self-portrait project showed growth in self-reflection. Earlier work tended to stay on the surface; this project showed her making connections between who she is, what she loves, and what she wants to contribute. That kind of layered self-knowledge is the foundation for meaningful goal-setting.",goals:"The most important focus for Megan in the coming cycle is developing investigative habits to match her advocacy instincts. She cares deeply and acts from that care; the next step is learning to back her advocacy with evidence she has gathered herself. An animal observation journal, or a simple survey of her school community, would be a natural starting point.\\n\\nConnecting her art and music to quantitative thinking -- how many animals are in shelters in our area, what are the trends -- would strengthen her work and open new ways of making the case she already wants to make."},
  sakura:{glows:"Sakura's softball evidence tells a story of remarkable emotional leadership. Organizing encouraging words for each teammate after a loss, at nine years old, is not a small thing. The Understands others and Builds connections indicators are both in evidence here in a meaningful way.\\n\\nHer ocean watercolor series shows the combination of careful research and genuine artistic investment that makes her work distinctive. She did not just paint pretty pictures -- she researched each zone, included scientific names, and produced work that is now on display in the library. That integration of inquiry and expression is exactly what we want to build on.",grows:"Sakura's beach cleanup evidence marks an important transition -- from observer to actor. She did not just participate, she organized her family, counted and categorized the findings, and brought her data back to the classroom. That is growth in Community needs and Sustainable development that came entirely from her own initiative.\\n\\nThe question she asked -- why were plastic bags the most common item -- is the beginning of genuine investigative thinking. She has not yet designed an investigation, but she is asking the kind of question that investigations start from. That is growth worth building on.",goals:"The most natural next step for Sakura is presenting what she knows. She has done substantial research on sea turtles and has produced beautiful work about the ocean -- the opportunity is sharing it with an audience and adapting her communication for different listeners.\\n\\nDesigning a simple investigation connected to her plastic bag question would develop her ER skills in a way that connects directly to something she already cares about. The question is there; the next step is helping her figure out how to answer it."},
  bodhi:{glows:"Bodhi's Scratch game is genuinely impressive for a fifth grader. Variables, conditional logic, collision detection, a scoring system, a timer, and a win condition -- these are not beginner concepts. That he also tested it with classmates and revised based on their feedback shows a student who understands that making things for others requires understanding what others need.\\n\\nHis cross country data practice is sophisticated and entirely self-directed. He tracks his times, identifies variables, and adjusts his approach. That is exactly the Uses math strategies indicator at Level 3, and it is happening in service of something he deeply cares about.",grows:"The tutorial video marks meaningful growth in Communication. Bodhi is naturally private about his work; choosing to film and share a tutorial that anticipates other people's questions is a significant step toward thinking about audience rather than just executing for himself.\\n\\nHis Math Olympiad performance showed growth in explaining his thinking to others. He solved two hard problems and then explained his approach to teammates -- not because he was asked to, but because he understood that sharing his reasoning was valuable. That is growth in Communicates learning.",goals:"The most important focus for Bodhi in the coming cycle is broadening his audience and his awareness of social context. His work is exceptional but largely self-referential -- he builds games and sets running goals for himself. The opportunity is beginning to think about how his skills and interests can contribute to something larger.\\n\\nDeveloping his SR indicators is the natural target. He has not yet connected his interests to community issues or social questions. A project that uses his programming skills in service of a real community need -- an app that helps shelter animals find homes, for example -- would be a powerful bridge."},
  maggie:{glows:"Maggie's waste audit is the strongest student-led investigation I have seen at this grade level. She designed the protocol, trained the team, analyzed the results, and translated her findings into a persuasive presentation to the principal. The ER indicators across the board are at Level 3, and the SR indicators are equally strong -- she understands how individual and group actions shape communities over time.\\n\\nHer lead climbing certification story is a masterclass in Personal Qualities development. She failed, identified specifically what went wrong, practiced those elements, and returned three weeks later to pass. That cycle -- failure, analysis, targeted practice, success -- is exactly what Builds resilience and Self-appraisal look like at Level 3.",grows:"Maggie's growth this cycle is most visible in her willingness to share her work publicly. Earlier in the year she did her best work in relative privacy. Presenting to the principal, filing a proposal, and speaking at an advisory session represent a student who is beginning to understand that her work is meant to be seen and acted on.\\n\\nHer outdoor education journal shows growth in self-reflection that is distinct from her advocacy work. She is beginning to reflect on group dynamics and her own role in them -- a kind of social self-awareness that complements her environmental focus.",goals:"The most important focus for Maggie in the coming cycle is strengthening the quantitative foundation of her advocacy. Her arguments are compelling but rely heavily on percentages from her own audit. Learning to find, interpret, and cite external data -- city reports, peer-reviewed research, policy documents -- will make her work significantly more credible and significantly harder to dismiss.\\n\\nA second focus: helping Maggie engage seriously with perspectives that complicate her positions. She is a strong advocate, which is a gift, and the next step is developing the intellectual discipline to steelman the other side before arguing against it."},
  owen:{glows:"Owen's documentary on the forgotten park is genuinely professional work. Identifying five interview subjects across different stakeholder groups, structuring the narrative arc, and editing it to a 12-minute film that generated real community discussion at a public meeting -- these are skills that many adults in communications fields have not developed. Communication indicators across the board are at Level 4.\\n\\nHis Eagle Scout project demonstrates something equally important: the ability to manage a complex, multi-month, multi-stakeholder initiative while still meeting his other commitments. Eighteen volunteers, a permit application, a budget, and a parks department relationship -- all managed by a 9th grader. That is KHTL at Level 4 across every indicator.",grows:"The most significant growth this cycle is Owen's increasing awareness of his own limitations as an investigator. His LP conversation showed genuine self-awareness: he acknowledged that his films start with a position and work backward rather than starting with inquiry. That kind of honesty is the prerequisite for growth, and it shows up in his documentary work -- the forgotten park film is more genuinely investigative than his earlier work.\\n\\nHis ski instructor work shows growth in perspective-taking that is distinct from his filmmaking. Adapting his teaching for eight different six-year-olds, and identifying one who needed a completely different approach, shows a student developing real empathy and flexibility.",goals:"The most important focus for Owen in the coming cycle is developing investigative rigor to match his communicative skill. He can argue powerfully; the next step is building arguments that start from genuine inquiry rather than a predetermined conclusion. For his next documentary, the assignment should be: find the most compelling counterargument and film it first.\\n\\nExploring the film production internship is a natural priority. Owen is ready for professional mentorship, and the gap between what he is producing and what is professionally possible is narrowing rapidly. An internship would accelerate that development in ways that school alone cannot."}

function avgRatings(sid,ev){
  const ap=ev.filter(e=>e.studentId===sid&&e.status==='approved'),su={},co={};
  ap.forEach(e=>{Object.entries(e.ratings||{}).forEach(([s,inds])=>{if(!su[s]){su[s]={};co[s]={};}Object.entries(inds).forEach(([i,l])=>{if(l>0){su[s][i]=(su[s][i]||0)+l;co[s][i]=(co[s][i]||0)+1;}});});});
  const r={};Object.entries(su).forEach(([s,inds])=>{r[s]={};Object.entries(inds).forEach(([i,v])=>{r[s][i]=v/co[s][i];});});
  return r;
}

function ratToCell(rat,useFrames){
  var c={};Object.entries(rat||{}).forEach(function(e1){var s=e1[0],inds=e1[1];var activeInd=useFrames?(F_IND[s]||IND[s]):(IND[s]||F_IND[s]);if(!activeInd)return;Object.entries(inds).forEach(function(e2){var i=e2[0],l=e2[1];var ci=activeInd.indexOf(i);if(ci>=0&&l>0)c[s+'-'+ci]=l;});});
  return c;
}

function leafPos(n){
  const cc=n<=8?4:5,rc=Math.ceil(n/cc),p=[];
  for(let i=0;i<n;i++){const row=Math.floor(i/cc),col=i%cc,ir=row<rc-1?cc:n-(rc-1)*cc;p.push({dx:(col-(ir-1)/2)*24,dy:(row-(rc-1)/2)*22,a:(col-(ir-1)/2)*24*0.45});}
  return p;
}

class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(err){return{hasError:true,error:err};}
  componentDidCatch(err,info){console.error('BPL App error:',err,info);}
  render(){
    if(this.state.hasError){
      return RC('div',{style:{padding:'24px',background:'#fff5f5',border:'1px solid #fca5a5',borderRadius:'8px',margin:'16px',fontFamily:'system-ui'}},
        RC('div',{style:{fontWeight:600,color:'#dc2626',marginBottom:'8px',fontSize:'14px'}},'Something went wrong. Please share this message with Carrie:'),
        RC('div',{style:{fontSize:'12px',color:'#333',background:'#fff',padding:'12px',borderRadius:'6px',whiteSpace:'pre-wrap',overflowX:'auto',maxHeight:'300px',overflow:'auto'}},
          this.state.error?(this.state.error.message+String.fromCharCode(10)+String.fromCharCode(10)+this.state.error.stack):'Unknown error'
        ),
        RC('button',{onClick:function(){window.location.reload();},style:{marginTop:'12px'}},'Reload page')
      );
    }
    return this.props.children;
  }
}

        var hasEvidence=allVals.length>0;
        return RC('text',{

          x:s.cx,

function HeatMapModal({sid,studentId,evidence,lpGoals,onClose,onJumpToEvidence,frameMode}){
  const s=SC[sid];
  const inds=frameMode?F_IND[sid]:IND[sid];
  const caps=frameMode?F_CAPS[sid]:CAPS[sid];
  const cells=frameMode?F_CELLS[sid]:CELLS[sid];
  const progression=frameMode?F_PROGRESSION[sid]:PROGRESSION[sid];
  const maxLevel=frameMode?5:4;
  const [activeKey,setActiveKey]=useState(null);
  const [lockedKey,setLockedKey]=useState(null);
  const [showProgression,setShowProgression]=useState(false);
  var goalInds=(lpGoals&&lpGoals.scaffoldGoals&&lpGoals.scaffoldGoals[sid])
    ?(lpGoals.scaffoldGoals[sid].indicators||[]):[];

  // Calculate average level across all indicators for this scaffold
  const allScores=[];
  evidence.filter(e=>e.studentId===studentId&&e.status==='approved').forEach(ev=>{
    const ratings=ev.ratings[sid]||{};
    inds.forEach(ind=>{const v=ratings[ind]||0;if(v>0)allScores.push(v);});
  });
  const avgLevel=allScores.length?Math.round(allScores.reduce((a,b)=>a+b,0)/allScores.length):0;

  // Build freq map: freq[ci][level] = [{title,date},...]
  const freq={};
  evidence.filter(e=>e.studentId===studentId&&e.status==='approved').forEach(ev=>{
    const ratings=ev.ratings[sid]||{};
    inds.forEach((ind,ci)=>{
      const level=ratings[ind]||0;
      if(level>0){
        if(!freq[ci])freq[ci]={};
        if(!freq[ci][level])freq[ci][level]=[];
        freq[ci][level].push({title:ev.title,date:ev.date,id:ev.id});
      }
    });
  });

  function getShade(count){
    if(count===0)return{bg:'#fff',text:'#ccc',border:'#e0e0e0',countBorder:s.h2};
    if(count===1)return{bg:s.h1,text:s.h8,border:s.h2,countBorder:s.h6};
    if(count===2)return{bg:s.h2,text:s.h8,border:s.h6,countBorder:s.h8};
    return{bg:s.h6,text:'white',border:s.h8,countBorder:'rgba(255,255,255,0.5)'};
  }

  const displayKey=lockedKey||activeKey;
  const activeItems=displayKey?(freq[parseInt(displayKey.split('-')[0])]?.[parseInt(displayKey.split('-')[1])]||[]):[];
  const rows=frameMode?[5,4,3,2,1]:[4,3,2,1];

  return RC('div',{
    style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'},
    onClick:onClose
  },
    RC('div',{
      style:{background:'white',borderRadius:'12px',width:'100%',maxWidth:'1100px',maxHeight:'92vh',overflow:'hidden',display:'flex',flexDirection:'column',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'},
      onClick:e=>e.stopPropagation()
    },
      RC('div',{style:{background:s.h6,padding:'12px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}},
        RC('div',null,
          RC('div',{style:{color:'white',fontSize:'15px',fontWeight:500}},s.name+' — Evidence Heat Map'),
          RC('div',{style:{color:'rgba(255,255,255,0.75)',fontSize:'11px',marginTop:'2px'}},'Darker cells have more evidence pointing there — hover or tap to see which pieces contributed')
        ),
        RC('button',{onClick:onClose,style:{background:'rgba(255,255,255,0.2)',border:'none',color:'white',borderRadius:'6px',padding:'4px 12px',cursor:'pointer',fontSize:'12px',display:'flex',alignItems:'center',gap:'5px'}},
          RC('i',{className:'ti ti-x',style:{fontSize:'13px'}}),'Close'
        )
      ),
      RC('div',{style:{padding:'8px 16px',background:s.h5,borderBottom:'0.5px solid '+s.h1,display:'flex',alignItems:'center',gap:'16px',flexWrap:'wrap',flexShrink:0}},
        RC('span',{style:{fontSize:'11px',fontWeight:500,color:s.h8}},'Frequency:'),
        [[s.h1,s.h8,'1 evidence piece'],[s.h2,s.h8,'2 pieces'],[s.h6,'white','3 or more'],['#efefef','#555','LP goal']].map(([bg,text,label],i)=>
          RC('div',{key:i,style:{display:'flex',alignItems:'center',gap:'5px'}},
            RC('div',{style:{width:'22px',height:'14px',borderRadius:'3px',background:bg,border:'0.5px solid '+s.h2}}),
            RC('span',{style:{fontSize:'11px',color:s.h8}},label)
          )
        ),
        RC('div',{style:{flex:1}}),
        avgLevel>0&&RC('button',{
          onClick:()=>setShowProgression(p=>!p),
          style:{
            fontSize:'11px',fontWeight:500,
            background:showProgression?s.h6:'white',
            border:'0.5px solid '+(showProgression?s.h8:s.h2),
            color:showProgression?'white':s.h8,
            borderRadius:'6px',padding:'4px 10px',
            display:'flex',alignItems:'center',gap:'5px',
            transition:'all 0.15s',flexShrink:0
          }
        },
          RC('i',{className:'ti ti-chart-bar',style:{fontSize:'12px'}}),
          showProgression?'Hide Progression Level':'Show Progression Level'
        ),
        RC('span',{style:{fontSize:'11px',color:s.h8,fontStyle:'italic',display:'flex',alignItems:'center',gap:'4px'}},
          RC('i',{className:'ti ti-hand-finger',style:{fontSize:'12px'}}),
          'Tap or hover a cell to see which evidence contributed'
        )
      ),
      RC('div',{style:{
        padding:'8px 16px',minHeight:'36px',
        background:displayKey&&activeItems.length>0?s.h5:'#fafafa',
        borderBottom:'0.5px solid #e0e0e0',
        display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap',
        flexShrink:0,transition:'background 0.15s'
      }},
        displayKey&&activeItems.length>0
          ?RC('div',{style:{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}},
              RC('i',{className:'ti ti-file-text',style:{fontSize:'13px',color:s.h6,flexShrink:0}}),
              RC('span',{style:{fontSize:'11px',fontWeight:500,color:s.h8,marginRight:'4px'}},'Evidence:'),
              lockedKey&&RC('span',{style:{fontSize:'10px',background:s.h6,color:'white',borderRadius:'4px',padding:'1px 6px',marginRight:'4px'}},'locked -- click cell to unlock'),
              ...activeItems.map((item,i)=>RC('span',{
                key:i,
                onClick:()=>{if(onJumpToEvidence&&item.id){onJumpToEvidence(item.id);onClose();}},
                style:{
                  fontSize:'12px',color:s.h8,background:'white',
                  border:'0.5px solid '+s.h1,borderRadius:'5px',padding:'2px 8px',
                  cursor:onJumpToEvidence?'pointer':'default',
                  display:'flex',alignItems:'center',gap:'5px',
                  transition:'background 0.1s',
                },
                onMouseEnter:function(e){if(onJumpToEvidence)e.currentTarget.style.background=s.h5;},
                onMouseLeave:function(e){e.currentTarget.style.background='white';}
              },
                item.title+' ('+item.date+')',
                onJumpToEvidence&&RC('i',{className:'ti ti-arrow-right',style:{fontSize:'11px',opacity:0.6}})
              ))
            )
          :RC('span',{style:{fontSize:'11px',color:'#bbb',fontStyle:'italic'}},
              displayKey&&goalInds.includes(inds[parseInt(displayKey.split('-')[0])])?RC('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},RC('i',{className:'ti ti-target',style:{fontSize:'13px',color:'#888'}}),RC('span',{style:{fontSize:'12px',color:'#555',fontStyle:'italic'}},'LP goal for this cycle: '+inds[parseInt(displayKey.split('-')[0])]+' -- no evidence scored here yet')):displayKey?'No evidence scored here yet':'Hover a cell to preview -- click to lock it'
            )
      ),
      RC('div',{style:{overflowX:'auto',overflowY:'auto',flex:1,padding:'12px 16px'}},
        RC('table',{style:{borderCollapse:'collapse',minWidth:(inds.length*128+72)+'px'}},
          RC('tbody',null,
            rows.map(level=>RC('tr',{key:level},
              RC('td',{className:'lbl',style:{fontSize:'12px',fontWeight:500,color:s.h6,borderTop:'0.5px solid #e0e0e0',paddingTop:'7px'}},level+''),
              inds.map((ind,ci)=>{
                const items=(freq[ci]&&freq[ci][level])||[];
                const count=items.length;
                const sh=getShade(count);
                const key=ci+'-'+level;
                const isActive=lockedKey===key;
                const isHovered=!lockedKey&&activeKey===key;
                const txt=(cells[level]||[])[ci]||'';
                return RC('td',{
                  key:ci,
                  onMouseEnter:()=>{if(count>0||goalInds.includes(ind))setActiveKey(key);},
                  onClick:()=>{if(count>0||goalInds.includes(ind))setLockedKey(k=>k===key?null:key);},
                  style:{
                    cursor:count>0?'pointer':'default',
                    background:count>0?sh.bg:goalInds.includes(ind)?'#efefef':'#fff',color:count>0?sh.text:goalInds.includes(ind)?'#666':'#ccc',
                    border:'0.5px solid '+(isActive?s.h8:isHovered?s.h6:sh.border),
                    outline:isActive?'2.5px solid '+s.h8:isHovered?'1.5px solid '+s.h6:goalInds.includes(ind)&&count===0?'1.5px dashed #bbb':'none',
                    fontSize:'11px',lineHeight:'1.45',padding:'7px 9px',
                    verticalAlign:'top',transition:'all 0.1s',
                    position:'relative',minWidth:'128px',width:'128px',
                  }
                },
                  count>0&&RC('div',{style:{
                    position:'absolute',top:'4px',right:'4px',
                    background:count>=3?'rgba(255,255,255,0.25)':sh.border,
                    borderRadius:'50%',width:'16px',height:'16px',
                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontSize:'9px',fontWeight:700,
                    color:count>=3?'white':s.h8,
                  }},count),
                  txt
                );
              })
            ,
              showProgression&&progression&&progression[level]&&RC('td',{
                rowSpan:1,
                style:{
                  width:'300px',minWidth:'300px',maxWidth:'300px',
                  position:'sticky',right:0,zIndex:2,
                  verticalAlign:'top',padding:'8px 14px',
                  fontSize:'12px',lineHeight:'1.65',color:'#111',

      var avg=allVals.reduce(function(a,b){return a+b;},0)/allVals.length;

function EvForm({studentName,init,isEdit,onSave,onCancel,studentId,studentProjects,onAddProject,frameMode}){
  const [step,setStep]=useState(isEdit?2:1);
  const [form,setForm]=useState(init);
  const [listening,setListening]=useState(null);
  const [kidView,setKidView]=useState(false);
  const [tpOpen,setTpOpen]=useState(false);
  const [newProjectName,setNewProjectName]=useState('');
  const [showNewProject,setShowNewProject]=useState(false);
  const [tpMessages,setTpMessages]=useState([]);
  const [tpInput,setTpInput]=useState('');

  // Speech recognition setup
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  const hasMic=!!SpeechRecognition;

  function startListen(field){
    if(!SpeechRecognition)return;
    const rec=new SpeechRecognition();
    rec.lang='en-US';rec.interimResults=false;rec.maxAlternatives=1;
    rec.onresult=function(e){
      const txt=e.results[0][0].transcript;
      setForm(function(f){return Object.assign({},f,{[field]:f[field]?(f[field]+' '+txt):txt});});
      setListening(null);
    };

  function cSel(sid,ci,v,already){
    var activeInd=frameMode?F_IND[sid]:IND[sid];
    setForm(function(f){
      var key=sid+'-'+ci;
      var nc=Object.assign({},f.selectedCells);
      if(already){delete nc[key];}else{nc[key]=v;}
      var nr=Object.assign({},f.ratings);
      nr[sid]={};
      activeInd.forEach(function(ind,i){
        var k=sid+'-'+i;
        if(nc[k]!==undefined)nr[sid][ind]=nc[k];
        else nr[sid][ind]=0;
      });
      return Object.assign({},f,{selectedCells:nc,ratings:nr});
    });
  }

  function gSel(sid){
    var activeInd=frameMode?F_IND[sid]:IND[sid];
    var r={};
    activeInd.forEach(function(ind,ci){

      if(form.selectedCells[k]!==undefined)r[ci]=form.selectedCells[k];
    });
    return r;

function SimpleStudentView({stu,evidence,savedLP,onBack,onAddEv,students,setStudents,sId}){
  const col=SCOLS[stu.colorIdx%SCOLS.length]||{h6:'#2a6b4f',h5:'#f0f7f4',h1:'#a5d6c5'};
  const [adding,setAdding]=useState(false);
  const [form,setForm]=useState({title:'',comment:'',file:null,fileData:null,fileName:''});
  const stuEv=(evidence||[]).filter(function(e){return e.studentId===sId&&e.status!=='working';});
  const goal=savedLP&&savedLP.lookingForward?savedLP.lookingForward:'';

  function toggleSimple(){
    // If currently in simple mode, set simpleMode:false to override grade default
    // If currently in full view, set simpleMode:true to force simple
    var currentlySimple=stu.simpleMode!==false&&(stu.simpleMode||gradeIsSimple(stu.grade));
    setStudents(function(prev){return prev.map(function(s){return s.id===sId?Object.assign({},s,{simpleMode:!currentlySimple}):s;});});
  }

  function handleFile(e){
    var file=e.target.files&&e.target.files[0];
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){setForm(function(f){return Object.assign({},f,{file:file,fileData:ev.target.result,fileName:file.name});});};
    reader.readAsDataURL(file);
  }

  function handleSubmit(){
    if(!form.title.trim())return;
    var newEv={
      id:'e'+Date.now(),
      studentId:sId,
      title:form.title.trim(),
      type:form.fileData?'image':'link',
      content:form.fileData||'',
      note:form.comment.trim(),
      evidenceTag:'',
      category:'',
      date:new Date().toISOString().split('T')[0],
      submittedBy:'student',
      status:'approved',
      ratings:{},
      frameworks:{},
    };
    onAddEv(newEv);
    setForm({title:'',comment:'',file:null,fileData:null,fileName:''});
    setAdding(false);
  }

  return RC('div',{style:{minHeight:'100vh',background:'#f9fafb',fontFamily:'system-ui,sans-serif'}},
    // Header

function AnalyticsView({students,evidence,onClose,adv}){
  const SC_KEYS=Object.keys(SC);
  const BPL_GREEN='#2a6b4f';

  // Compute avg score per student per scaffold (0 if no evidence)
  function stuScaffoldAvg(sid,scKey){
    const approved=evidence.filter(e=>e.studentId===sid&&e.status==='approved');
    const scores=[];
    approved.forEach(function(ev){
      const ratings=(ev.ratings||{})[scKey]||{};
      Object.values(ratings).forEach(function(v){if(v>0)scores.push(v);});
    });
    if(!scores.length)return null;
    return scores.reduce(function(a,b){return a+b;},0)/scores.length;
  }

  // Evidence count per student per scaffold
  function stuScaffoldCount(sid,scKey){
    return evidence.filter(function(ev){
      return ev.studentId===sid&&ev.status==='approved'&&Object.keys(ev.ratings||{}).includes(scKey);
    }).length;
  }

  // Color scale: null=grey, 1=light, 4=dark
  function heatColor(val,scKey){
    if(val===null)return '#f0f0f0';
    var s=SC[scKey];
    var t=val/4;
    // Interpolate from h5 (light) to h6 (dark) using the scaffold's own colors
    return val<1.5?s.h5:val<2.5?s.h1:val<3.5?s.h6+'99':s.h6;
  }

  function textColor(val){
    if(val===null)return '#bbb';
    return val>=2.5?'white':'#333';
  }

  // Class averages per scaffold
  var classAvgs={};
  SC_KEYS.forEach(function(k){
    var allScores=[];
    students.forEach(function(s){
      var avg=stuScaffoldAvg(s.id,k);
      if(avg!==null)allScores.push(avg);
    });
    classAvgs[k]=allScores.length?allScores.reduce(function(a,b){return a+b;},0)/allScores.length:null;
  });

  // Evidence count per scaffold across whole advisory
  var classEvCount={};
  SC_KEYS.forEach(function(k){
    classEvCount[k]=students.reduce(function(sum,s){return sum+stuScaffoldCount(s.id,k);},0);
  });
  var maxEvCount=5; // Full bar = 5 pieces of evidence (target per scaffold)

  return RC('div',{style:{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.6)',zIndex:2000,display:'flex',alignItems:'flex-start',justifyContent:'center',overflowY:'auto',padding:'20px 16px'}},
    RC('div',{style:{background:'#f5f5f5',borderRadius:'16px',width:'100%',maxWidth:'900px',minHeight:'500px',boxShadow:'0 8px 32px rgba(0,0,0,0.2)'}},

      // Header
      RC('div',{style:{background:BPL_GREEN,borderRadius:'16px 16px 0 0',padding:'14px 20px',display:'flex',alignItems:'center',justifyContent:'space-between'}},
        RC('div',null,
          RC('div',{style:{color:'white',fontSize:'16px',fontWeight:600}},adv?adv.name+"'s Advisory — Analytics":'Advisory Analytics'),
          RC('div',{style:{color:'rgba(255,255,255,0.75)',fontSize:'11px',marginTop:'2px'}},students.length+' students · '+evidence.filter(function(e){return e.status==='approved';}).length+' approved evidence items')
        ),
        RC('button',{onClick:onClose,style:{background:'rgba(255,255,255,0.15)',border:'none',color:'white',borderRadius:'8px',padding:'6px 12px',cursor:'pointer',fontSize:'13px'}},'Close')
      ),

      RC('div',{style:{padding:'20px'}},

        // HEAT MAP
        RC('div',{style:{background:'white',borderRadius:'12px',padding:'20px',marginBottom:'16px',boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}},
          RC('div',{style:{fontSize:'14px',fontWeight:600,color:'#1a1a1a',marginBottom:'4px'}},'Learning Goal Heat Map'),
          RC('div',{style:{fontSize:'12px',color:'#888',marginBottom:'16px'}},'Average scaffold level per student. Grey = no evidence yet.'),

          // Scaffold header row
          RC('div',{style:{display:'grid',gridTemplateColumns:'120px repeat('+SC_KEYS.length+', 1fr)',gap:'4px',marginBottom:'4px'}},
            RC('div',null),
            SC_KEYS.map(function(k){
              return RC('div',{key:k,style:{textAlign:'center',fontSize:'10px',fontWeight:600,color:SC[k].h8,background:SC[k].h5,border:'0.5px solid '+SC[k].h1,borderRadius:'5px',padding:'3px 2px'}},SC[k].short);
            })
          ),

          // Student rows
          students.map(function(s){
            return RC('div',{key:s.id,style:{display:'grid',gridTemplateColumns:'120px repeat('+SC_KEYS.length+', 1fr)',gap:'4px',marginBottom:'4px',alignItems:'center'}},
              RC('div',{style:{fontSize:'12px',fontWeight:500,color:'#333',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',paddingRight:'8px'}},s.name),
              SC_KEYS.map(function(k){
                var val=stuScaffoldAvg(s.id,k);
                var cnt=stuScaffoldCount(s.id,k);
                return RC('div',{key:k,
                  title:val!==null?(s.name+' · '+SC[k].name+': avg '+val.toFixed(1)+' ('+cnt+' piece'+(cnt===1?'':'s')+')'):(s.name+' · '+SC[k].name+': no evidence yet'),

          // Class average row
          RC('div',{style:{display:'grid',gridTemplateColumns:'120px repeat('+SC_KEYS.length+', 1fr)',gap:'4px',marginTop:'8px',paddingTop:'8px',borderTop:'0.5px solid #eee',alignItems:'center'}},
            RC('div',{style:{fontSize:'11px',fontWeight:600,color:'#888'}},'Class avg'),
            SC_KEYS.map(function(k){
              var val=classAvgs[k];
              return RC('div',{key:k,style:{height:'32px',borderRadius:'6px',background:val!==null?SC[k].h5:'#f0f0f0',display:'flex',alignItems:'center',justifyContent:'center',border:'0.5px solid '+(val!==null?SC[k].h1:'#e0e0e0')}},
                RC('span',{style:{fontSize:'11px',fontWeight:700,color:val!==null?SC[k].h8:'#bbb'}},val!==null?val.toFixed(1):'—')
              );
            })
          )
        ),

        // EVIDENCE COVERAGE BARS
        RC('div',{style:{background:'white',borderRadius:'12px',padding:'20px',boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}},
          RC('div',{style:{fontSize:'14px',fontWeight:600,color:'#1a1a1a',marginBottom:'4px'}},'Learning Goal Coverage'),
          RC('div',{style:{fontSize:'12px',color:'#888',marginBottom:'16px'}},'How many pieces of evidence have been tagged to each learning goal across the advisory. Full bar = 5 pieces.'),
          SC_KEYS.map(function(k){
            var count=classEvCount[k];
            var pct=Math.min(100,maxEvCount>0?(count/maxEvCount)*100:0);
            var avg=classAvgs[k];

                  RC('span',{style:{fontSize:'11px',fontWeight:600,color:SC[k].h8,background:SC[k].h5,border:'0.5px solid '+SC[k].h1,borderRadius:'4px',padding:'1px 6px'}},SC[k].short),
                  RC('span',{style:{fontSize:'12px',color:'#555'}},SC[k].name)
                ),
                RC('div',{style:{display:'flex',gap:'12px',alignItems:'center'}},
                  RC('span',{style:{fontSize:'11px',color:'#888'}},count+' piece'+(count===1?'':'s')),
                  avg!==null&&RC('span',{style:{fontSize:'11px',fontWeight:600,color:SC[k].h8,background:SC[k].h5,borderRadius:'4px',padding:'1px 6px'}},'avg '+avg.toFixed(1))
                )
              ),
              RC('div',{style:{height:'10px',background:'#f0f0f0',borderRadius:'5px',overflow:'hidden'}},
                RC('div',{style:{height:'100%',width:pct+'%',background:SC[k].h6,borderRadius:'5px',transition:'width 0.4s ease'}})

      )
    )
  );

function wpScoreColor(type,val){
  if(val===null||val===undefined)return'#fff';
  if(val==='pending')return'#fffbeb';
  if(val==='na')return'#f5f5f5';
  if(type==='check')return val==='done'?'#e8f5e9':'#fff';
  if(type==='score'){if(val<=1)return'#fce4ec';if(val===2)return'#fff8e1';if(val===3)return'#e8f5e9';return'#e3f2fd';}
  if(type==='pct'){if(val<60)return'#fce4ec';if(val<75)return'#fff8e1';return'#e8f5e9';}
  return'#fff';
}

function wpScoreDisplay(type,val){
  if(val===null||val===undefined)return RC('span',{style:{color:'#ccc',fontSize:'11px'}},'—');
  if(val==='pending')return RC('span',{style:{color:'#f59e0b',fontSize:'11px',fontWeight:500}},'assigned');
  if(val==='na')return RC('span',{style:{color:'#bbb',fontSize:'11px'}},'n/a');
  if(type==='check')return val==='done'?RC('span',{style:{color:'#388e3c',fontSize:'16px'}},'✓'):RC('span',{style:{color:'#ccc'}},'—');
  if(type==='score')return RC('strong',null,val);
  if(type==='pct')return RC('span',null,val+'%');
  return RC('span',null,val);
}

function wpCycleVal(type,val){
  if(type==='check'){if(!val||val===null)return'done';if(val==='done')return'na';return null;}
  if(type==='score')return(!val||val>=4)?null:val+1;
  if(type==='pct')return(!val||val>=100)?null:Math.min(100,Math.round((val||0)/25)*25+25);
}

function WPGradebook({entries,setEntries,classStudents,activeClass,onAddAssignment}){
  const [groupMode,setGroupMode]=useState('date');
  const [filterCat,setFilterCat]=useState('');
  const [filterProj,setFilterProj]=useState('');
  const [showAddForm,setShowAddForm]=useState(false);
  const [newLabel,setNewLabel]=useState('');
  const [newType,setNewType]=useState('check');
  const [newCat,setNewCat]=useState('');
  const [newProj,setNewProj]=useState('');
  const [editingCell,setEditingCell]=useState(null);
  const [editingVal,setEditingVal]=useState('');

  const filtered=entries.filter(function(e){
    if(filterCat&&e.cat!==filterCat)return false;
    if(filterProj&&e.proj!==filterProj)return false;
    return true;
  });

  const cats=[...new Set(entries.map(function(e){return e.cat;}).filter(Boolean))].sort();
  const projs=[...new Set(entries.map(function(e){return e.proj;}).filter(Boolean))].sort();

  function getGroups(){
    if(groupMode==='date'){
      var byDate={};var order=[];
      filtered.forEach(function(e){var d=e.date||'Unknown';if(!byDate[d]){byDate[d]=[];order.push(d);}byDate[d].push(e);});
      return order.sort().reverse().map(function(d){return{label:d,entries:byDate[d]};});
    }
    if(groupMode==='cat'){
      var byCat={};var catOrder=[];
      filtered.forEach(function(e){var c=e.cat||'Uncategorized';if(!byCat[c]){byCat[c]=[];catOrder.push(c);}byCat[c].push(e);});
      return catOrder.sort().map(function(c){return{label:c,entries:byCat[c]};});
    }
    if(groupMode==='proj'){
      var byProj={};var projOrder=[];
      filtered.forEach(function(e){var p=e.proj||'No project';if(!byProj[p]){byProj[p]=[];projOrder.push(p);}byProj[p].push(e);});
      return projOrder.sort().map(function(p){return{label:p,entries:byProj[p]};});
    }
    return[];
  }

  function toggleCell(entryId,stuId){
    setEntries(function(prev){
      return prev.map(function(e){
        if(e.id!==entryId)return e;
        var cur=e.data[stuId];
        var next=wpCycleVal(e.type,cur);
        var nd=Object.assign({},e.data,{[stuId]:next});
        return Object.assign({},e,{data:nd});

  function addEntry(){
    if(!newLabel.trim())return;
    var data={};
    classStudents.forEach(function(s){data[s.id]=null;});
    setEntries(function(prev){return [{
      id:'e'+Date.now(),date:new Date().toISOString().slice(0,10),
      label:newLabel.trim(),cat:newCat.trim(),proj:newProj.trim(),type:newType,data:data
    },...prev];});

    // Controls row

            style:{fontSize:'12px',padding:'5px 12px',border:'none',borderLeft:g[0]!=='date'?'0.5px solid #ccc':'none',

        style:{fontSize:'12px',padding:'5px 8px',border:'0.5px solid #ccc',borderRadius:'8px',background:'white'}},
        RC('option',{value:''},'All categories'),
        cats.map(function(c){return RC('option',{key:c,value:c},c);})
      ),
      // Project filter
      projs.length>0&&RC('select',{value:filterProj,onChange:function(e){setFilterProj(e.target.value);},
        style:{fontSize:'12px',padding:'5px 8px',border:'0.5px solid #ccc',borderRadius:'8px',background:'white'}},
        RC('option',{value:''},'All projects'),

          style:{fontSize:'12px',padding:'5px 8px',border:'0.5px solid #ccc',borderRadius:'6px',width:'100px'}})
      ),
      RC('button',{onClick:addEntry,style:{fontSize:'12px',padding:'5px 14px',borderRadius:'6px',background:BPL,color:'white',border:'none',cursor:'pointer'}},'Add'),
      RC('button',{onClick:function(){setShowAddForm(false);},style:{fontSize:'12px',padding:'5px 10px',borderRadius:'6px',background:'white',border:'0.5px solid #ccc',cursor:'pointer'}},'Cancel')
    ),

    // Gradebook table
    RC('div',{style:{overflowX:'auto'}},
      RC('table',{style:{borderCollapse:'collapse',width:'100%',fontSize:'12px'}},
        RC('thead',null,
          RC('tr',null,
            RC('th',{style:{textAlign:'left',padding:'6px 8px',background:'#f5f5f5',borderBottom:'0.5px solid #ddd',fontSize:'11px',fontWeight:600,color:'#555',minWidth:'140px',position:'sticky',left:0}},''),
            classStudents.map(function(s){
              return RC('th',{key:s.id,style:{padding:'6px 4px',background:'#f5f5f5',borderBottom:'0.5px solid #ddd',fontSize:'11px',fontWeight:600,color:'#333',textAlign:'center',minWidth:'70px'}},s.name);
            })
          )
        ),
        RC('tbody',null,
          groups.map(function(g){
            return RC(React.Fragment,{key:g.label},
              RC('tr',null,
                RC('td',{colSpan:classStudents.length+1,style:{padding:'6px 8px',background:'#f9f9f9',fontSize:'11px',fontWeight:600,color:'#888',borderTop:'0.5px solid #e0e0e0'}},g.label)
              ),
              g.entries.map(function(e){
                return RC('tr',{key:e.id,style:{borderBottom:'0.5px solid #f0f0f0'}},
                  RC('td',{style:{padding:'6px 8px',fontWeight:500,color:'#1a1a1a',whiteSpace:'nowrap',position:'sticky',left:0,background:'white',borderRight:'0.5px solid #eee'}},
                    e.label,
                    e.proj&&RC('span',{style:{fontSize:'10px',color:'#aaa',marginLeft:'4px'}},e.proj)
                  ),
                  classStudents.map(function(s){
                    var val=e.data[s.id]!==undefined?e.data[s.id]:null;
                    var bg=wpScoreColor(e.type,val);
                    var cellKey=e.id+'-'+s.id;
                    var isEditing=editingCell===cellKey;
                    var isNumeric=e.type==='pct'||e.type==='score';
                    if(isEditing&&isNumeric){
                      return RC('td',{key:s.id,style:{padding:'2px',textAlign:'center',background:bg,minWidth:'70px'}},
                        RC('input',{
                          type:'number',
                          value:editingVal,
                          autoFocus:true,
                          min:e.type==='score'?1:0,
                          max:e.type==='score'?4:100,
                          onChange:function(ev){setEditingVal(ev.target.value);},
                          onBlur:function(){
                            var num=parseFloat(editingVal);
                            var newVal=isNaN(num)?null:(e.type==='score'?Math.min(4,Math.max(1,Math.round(num))):Math.min(100,Math.max(0,Math.round(num))));
                            setEntries(function(prev){return prev.map(function(en){
                              if(en.id!==e.id)return en;
                              return Object.assign({},en,{data:Object.assign({},en.data,{[s.id]:newVal})});
                            });});
                            setEditingCell(null);setEditingVal('');
                          },
                          onKeyDown:function(ev){
                            if(ev.key==='Enter')ev.target.blur();
                            if(ev.key==='Escape'){setEditingCell(null);setEditingVal('');}
                          },
                          style:{width:'60px',textAlign:'center',fontSize:'12px',fontWeight:600,border:'1.5px solid '+BPL,borderRadius:'4px',padding:'2px 4px',outline:'none',background:'white'}
                        })
                      );
                    }
                    return RC('td',{key:s.id,
                      onClick:function(){
                        if(isNumeric){
                          setEditingCell(cellKey);
                          setEditingVal(val!==null&&val!==undefined?String(val):'');
                        } else {
                          toggleCell(e.id,s.id);
                        }
                      },
                      style:{padding:'4px',textAlign:'center',background:bg,cursor:'pointer',userSelect:'none',minWidth:'70px'}},
                      wpScoreDisplay(e.type,val)
                    );
                  })
                );
              })
            );
          })
        )
      )
    )
  );
}

function WPStudentDetail({stu,entries,setEntries,fieldNotes,workItems,assignments,evidence,onBack,onAddFieldNote,onSendToShowcase,onViewSP}){
  const [expandedGroups,setExpandedGroups]=useState({});
  const [selectedForBundle,setSelectedForBundle]=useState({});
  const [showBundleForm,setShowBundleForm]=useState(false);
  const [bundleNote,setBundleNote]=useState('');
  const [bundleEvidenceTag,setBundleEvidenceTag]=useState('');
  const [bundleSelectedScaffolds,setBundleSelectedScaffolds]=useState([]);
  const [bundleOpenGrid,setBundleOpenGrid]=useState(null);
  const [bundleSelectedCells,setBundleSelectedCells]=useState({});
  const [bundleKidView,setBundleKidView]=useState(false);

  function bundleGSel(sid){
    var r={};
    IND[sid].forEach(function(ind,ci){
      var k=sid+'-'+ci;
      if(bundleSelectedCells[k]!==undefined)r[ci]=bundleSelectedCells[k];
    });
    return r;
  }
  function bundleCSel(sid,ci,v,already){
    setBundleSelectedCells(function(p){
      var key=sid+'-'+ci;
      var n=Object.assign({},p);
      if(already){delete n[key];}else{n[key]=v;}
      return n;
    });
  }
  function bundleCellCount(sid){
    return IND[sid].filter(function(ind,ci){return bundleSelectedCells[sid+'-'+ci]!==undefined;}).length;
  }
  function bundleRatingsFromCells(){
    var r={};
    bundleSelectedScaffolds.forEach(function(sid){
      r[sid]={};
      IND[sid].forEach(function(ind,ci){
        var k=sid+'-'+ci;
        if(bundleSelectedCells[k]!==undefined)r[sid][ind]=bundleSelectedCells[k];
        else r[sid][ind]=0;
      });
    });
    return r;
  }

  function toggleBundle(id){setSelectedForBundle(function(p){var n=Object.assign({},p);if(n[id])delete n[id];else n[id]=true;return n;});}
  var bundleCount=Object.keys(selectedForBundle).length;
  var stuEntries=entries.filter(function(e){
    return e.data[stu.id]!==undefined&&e.data[stu.id]!==null;
  });
  var pendingTasks=stuEntries.filter(function(t){return t.data[stu.id]==='pending';});
  var completedTasks=stuEntries.filter(function(t){return t.data[stu.id]!=='pending';});
  var stuNotes=fieldNotes[stu.id]||[];
  var stuWork=workItems[stu.id]||[];

  function markDone(entryId){
    setEntries(function(prev){
      return prev.map(function(e){
        if(e.id!==entryId)return e;
        var cur=e.data[stu.id];
        var next=cur==='done'?'pending':'done';
        return Object.assign({},e,{data:Object.assign({},e.data,{[stu.id]:next})});
      });
    });
  }

  function renderTaskGroup(tasks,isPending){
    var grouped={};var order=[];
    tasks.forEach(function(t){
      var key=t.label+(t.proj?'::'+t.proj:'');
      if(!grouped[key]){grouped[key]=[];order.push(key);}
      grouped[key].push(t);
    });
    return order.map(function(key){
      var items=grouped[key];var first=items[0];
      var isExpanded=expandedGroups[key];
      var isMulti=items.length>1;
      var val=first.data[stu.id];
      var display=val==='done'?'done':val==='na'?'n/a':val==='pending'?'assigned':typeof val==='number'?(first.type==='pct'?val+'%':val):'';

      if(isMulti){
        return RC('div',{key:key,style:{borderRadius:'6px',background:isPending?'#f0f7f4':'#fafafa',marginBottom:'3px',border:'0.5px solid '+(isPending?'#a5d6c5':'#e8e8e8'),overflow:'hidden'}},
          RC('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'5px 10px'}},
            RC('input',{type:'checkbox',checked:!!selectedForBundle[key],onChange:function(){toggleBundle(key);},style:{cursor:'pointer',flexShrink:0,width:'14px',height:'14px'}}),
            RC('div',{style:{flex:1,minWidth:0}},
              RC('div',{style:{display:'flex',alignItems:'center',gap:'5px'}},
                RC('span',{style:{fontSize:'11px',color:'#1a1a1a',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},first.label),
                (evidence||[]).some(function(e){return e.fromWP&&e.studentId===stu.id&&e.wpItems&&e.wpItems.includes(key);})&&
                  RC('span',{style:{fontSize:'9px',padding:'1px 6px',borderRadius:'4px',background:'#f0f7f4',border:'0.5px solid #a5d6c5',color:BPL,fontWeight:500,flexShrink:0}},'Sent')
              ),
              first.proj&&RC('span',{style:{fontSize:'10px',color:'#aaa'}},first.proj)
            ),
            RC('span',{style:{fontSize:'10px',background:isPending?'#f0f7f4':'#eee',color:isPending?BPL:'#888',borderRadius:'10px',padding:'1px 7px',fontWeight:500}},items.length),
            RC('button',{onClick:function(){setExpandedGroups(function(p){return Object.assign({},p,{[key]:!p[key]});});},
              style:{fontSize:'10px',border:'none',background:'none',cursor:'pointer',color:BPL,padding:'0 4px'}},isExpanded?'▲':'▼')
          ),
          isExpanded&&RC('div',null,
            items.map(function(t){
              var v=t.data[stu.id];
              return RC('div',{key:t.id,style:{display:'flex',alignItems:'center',gap:'8px',padding:'3px 10px 3px 24px',borderTop:'0.5px solid #e8e8e8',background:'white'}},
                RC('span',{style:{fontSize:'11px',color:'#555',flex:1}},t.date),
                isPending
                  ?RC('button',{onClick:function(){markDone(t.id);},style:{fontSize:'10px',padding:'2px 8px',borderRadius:'5px',background:BPL,color:'white',border:'none',cursor:'pointer'}},'Mark done')
                  :RC('span',{style:{fontSize:'11px',color:'#555'}},v==='done'?'✓ done':v)
              );
            })
          )
        );
      }

      return RC('div',{key:key,style:{display:'flex',alignItems:'center',gap:'8px',padding:'6px 10px',borderRadius:'6px',
        background:isPending?'#f0f7f4':'#fafafa',marginBottom:'3px',border:'0.5px solid '+(isPending?'#a5d6c5':'#e8e8e8')}},
        RC('input',{type:'checkbox',checked:!!selectedForBundle[key],onChange:function(){toggleBundle(key);},style:{cursor:'pointer',flexShrink:0,width:'14px',height:'14px'}}),
        RC('div',{style:{flex:1,minWidth:0}},
          RC('div',{style:{display:'flex',alignItems:'center',gap:'5px'}},
            RC('span',{style:{fontSize:'11px',color:'#1a1a1a',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},first.label),
            (evidence||[]).some(function(e){return e.fromWP&&e.studentId===stu.id&&e.wpItems&&e.wpItems.includes(key);})&&
              RC('span',{style:{fontSize:'9px',padding:'1px 6px',borderRadius:'4px',background:'#f0f7f4',border:'0.5px solid #a5d6c5',color:BPL,fontWeight:500,flexShrink:0}},'Sent')
          ),
          first.proj&&RC('span',{style:{fontSize:'10px',color:'#aaa'}},first.proj)
        ),
        RC('div',{style:{flexShrink:0}},
          isPending
            ?RC('button',{onClick:function(){markDone(first.id);},style:{fontSize:'10px',padding:'2px 8px',borderRadius:'5px',background:BPL,color:'white',border:'none',cursor:'pointer'}},'Mark done')
            :RC('span',{style:{fontSize:'11px',fontWeight:500,color:'#888'}},display)
        )
      );
    });
  }

  return RC('div',{style:{display:'flex',gap:'16px',flexWrap:'wrap'}},
    // Left panel - student info
    RC('div',{style:{width:'220px',flexShrink:0}},
      RC('button',{onClick:onBack,style:{fontSize:'12px',color:BPL,background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:'4px',marginBottom:'12px',padding:0}},
        RC('i',{className:'ti ti-arrow-left',style:{fontSize:'12px'}}),'All students'),
      RC('div',{style:{background:'white',borderRadius:'12px',padding:'16px',border:'0.5px solid #e0e0e0',marginBottom:'10px'}},
        RC('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px'}},
          RC('div',{style:{width:'40px',height:'40px',borderRadius:'50%',background:'#f0f7f4',border:'2px solid #a5d6c5',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'14px',fontWeight:600,color:BPL}},stu.initials||stu.name[0]),
          RC('div',null,RC('div',{style:{fontWeight:600,fontSize:'14px'}},stu.name),RC('div',{style:{fontSize:'12px',color:'#888'}},stu.grade))
        ),
        RC('button',{onClick:function(){onAddFieldNote(stu.id);},
          style:{width:'100%',fontSize:'12px',padding:'6px',borderRadius:'8px',background:'#f0f7f4',border:'0.5px solid #a5d6c5',color:BPL,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'4px'}},
          RC('i',{className:'ti ti-pencil',style:{fontSize:'12px'}}),'Add field note'),
        RC('button',{onClick:function(){if(onViewSP)onViewSP(stu);},
          style:{width:'100%',fontSize:'12px',padding:'6px',borderRadius:'8px',background:'white',border:'0.5px solid #e0e0e0',color:'#555',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'4px',marginTop:'6px'}},
          RC('i',{className:'ti ti-external-link',style:{fontSize:'12px'}}),'View Showcase Portfolio')
      ),
      // Field notes
      stuNotes.length>0&&RC('div',{style:{background:'white',borderRadius:'12px',padding:'14px',border:'0.5px solid #e0e0e0'}},
        RC('div',{style:{fontSize:'12px',fontWeight:600,color:'#555',marginBottom:'10px'}},'Field notes ('+stuNotes.length+')'),
        stuNotes.slice().reverse().map(function(n){
          return RC('div',{key:n.id,style:{marginBottom:'10px',paddingBottom:'10px',borderBottom:'0.5px solid #f0f0f0'}},
            RC('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'3px'}},
              RC('div',{style:{fontSize:'10px',color:'#aaa'}},n.date+(n.time?' · '+n.time:'')),
              RC('div',{style:{display:'flex',alignItems:'center',gap:'5px'}},
                n.sharedWithStudent&&RC('span',{style:{fontSize:'9px',padding:'1px 6px',borderRadius:'4px',background:'#f0f7f4',border:'0.5px solid #a5d6c5',color:BPL,fontWeight:500}},'Shared'),
                n.scaffolds&&n.scaffolds.length>0&&RC('div',{style:{display:'flex',gap:'3px'}},
                  n.scaffolds.map(function(sid){var s=SC[sid];return s?RC('span',{key:sid,style:{fontSize:'9px',padding:'1px 6px',borderRadius:'4px',background:s.h5,border:'0.5px solid '+s.h1,color:s.h8,fontWeight:500}},s.short):null;})
                )
              )
            ),
            RC('div',{style:{fontSize:'12px',color:'#333',lineHeight:'1.5'}},n.text)
          );
        })
      )
    ),

    // Right panel - tasks and work
    RC('div',{style:{flex:1,minWidth:'300px'}},
      // Pending tasks
      pendingTasks.length>0&&RC('div',{style:{marginBottom:'16px'}},
        RC('div',{style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'6px'}},
          RC('div',{style:{fontSize:'11px',fontWeight:600,color:BPL}},'To do'),
          RC('span',{style:{fontSize:'10px',background:'#f0f7f4',color:BPL,borderRadius:'10px',padding:'1px 7px',fontWeight:500}},pendingTasks.length)
        ),
        renderTaskGroup(pendingTasks,true),
        completedTasks.length>0&&RC('div',{style:{fontSize:'11px',fontWeight:500,color:'#888',marginTop:'10px',marginBottom:'5px'}},'Completed')
      ),
      // Completed tasks
      completedTasks.length>0&&!pendingTasks.length&&RC('div',{style:{fontSize:'11px',fontWeight:500,color:'#888',marginBottom:'5px'}},'This cycle'),
      completedTasks.length>0&&RC('div',{marginBottom:'16px'},renderTaskGroup(completedTasks,false)),

      // Work on file
      stuWork.length>0&&RC('div',{style:{background:'white',borderRadius:'12px',padding:'14px',border:'0.5px solid #e0e0e0',marginTop:'12px'}},
        RC('div',{style:{fontSize:'12px',fontWeight:600,color:'#555',marginBottom:'8px'}},'Work on file'),
        stuWork.map(function(w){
          var wKey='work::'+w.id;
          var isSelected=!!selectedForBundle[wKey];
          return RC('div',{key:w.id,style:{marginBottom:'8px',paddingBottom:'8px',borderBottom:'0.5px solid #f0f0f0',
            background:isSelected?'#f0f7f4':'white',borderRadius:'6px',padding:'6px 8px',
            border:'0.5px solid '+(isSelected?'#a5d6c5':'transparent'),cursor:'pointer'},
            onClick:function(){toggleBundle(wKey);}},
            RC('div',{style:{display:'flex',alignItems:'flex-start',gap:'8px'}},
              RC('input',{type:'checkbox',checked:isSelected,onChange:function(){toggleBundle(wKey);},
                onClick:function(e){e.stopPropagation();},
                style:{cursor:'pointer',flexShrink:0,marginTop:'2px',width:'14px',height:'14px'}}),
              RC('div',{style:{flex:1,minWidth:0}},
                RC('div',{style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'2px'}},
                  RC('div',{style:{fontSize:'13px',fontWeight:500,color:'#1a1a1a'}},w.title),
                  (evidence||[]).some(function(e){return e.fromWP&&e.studentId===stu.id&&e.wpItems&&e.wpItems.includes(wKey);})&&
                    RC('span',{style:{fontSize:'9px',padding:'1px 6px',borderRadius:'4px',background:'#f0f7f4',border:'0.5px solid #a5d6c5',color:BPL,fontWeight:500,flexShrink:0}},'Sent to Showcase')
                ),
                RC('div',{style:{fontSize:'11px',color:'#888',marginBottom:'3px'}},w.date),
                w.desc&&RC('div',{style:{fontSize:'12px',color:'#555',lineHeight:'1.5'}},w.desc),
                w.scaffolds&&w.scaffolds.length>0&&RC('div',{style:{display:'flex',gap:'4px',marginTop:'4px'}},
                  w.scaffolds.map(function(k){
                    return RC('span',{key:k,style:{fontSize:'9px',padding:'1px 5px',borderRadius:'4px',background:SC[k]?SC[k].h5:'#eee',border:'0.5px solid '+(SC[k]?SC[k].h1:'#ddd'),color:SC[k]?SC[k].h8:'#888'}},SC[k]?SC[k].short:k);
                  })
                )
              )
            )
          );
        })
      )
    ),

    // Bundle + Send to Showcase
    bundleCount>0&&RC('div',{style:{position:'sticky',bottom:'16px',background:'white',border:'0.5px solid #a5d6c5',borderRadius:'12px',padding:'14px',marginTop:'12px',boxShadow:'0 2px 12px rgba(0,0,0,0.1)'}},
      showBundleForm
        ?RC('div',null,
            RC('div',{style:{fontSize:'13px',fontWeight:600,color:'#1a1a1a',marginBottom:'8px'}},'Send '+bundleCount+' item'+(bundleCount===1?'':'s')+' to Showcase Portfolio'),
            RC('div',{style:{marginBottom:'10px'}},
              RC('label',{style:{fontSize:'11px',fontWeight:600,color:'#555',display:'block',marginBottom:'3px'}},'Educator note'),
              RC('textarea',{value:bundleNote,onChange:function(e){setBundleNote(e.target.value);},
                placeholder:'What does this bundle of evidence show about '+stu.name+"'s learning?",rows:2,
                style:{width:'100%',boxSizing:'border-box',fontSize:'12px',border:'0.5px solid #ddd',borderRadius:'8px',padding:'8px',resize:'none',outline:'none'}})
            ),
            RC('div',{style:{marginBottom:'10px'}},
              RC('label',{style:{fontSize:'11px',fontWeight:600,color:'#555',display:'block',marginBottom:'3px'}},'Evidence tag (optional)'),
              RC('div',{style:{fontSize:'10px',color:'#888',marginBottom:'4px',fontStyle:'italic'}},'What does this bundle show about this learner? Why does it belong in the Showcase?'),
              RC('textarea',{value:bundleEvidenceTag,onChange:function(e){setBundleEvidenceTag(e.target.value);},
                placeholder:'e.g. This bundle shows sustained engagement with a real-world documentary project across multiple phases...',rows:2,
                style:{width:'100%',boxSizing:'border-box',fontSize:'12px',padding:'8px',border:'0.5px solid #ddd',borderRadius:'8px',resize:'none',outline:'none'}})
            ),
            RC('div',{style:{fontSize:'12px',fontWeight:600,color:'#555',marginBottom:'8px'}},'Tag scaffolds and score this bundle:'),
            RC('div',{style:{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'10px'}},
              Object.keys(SC).map(function(sid){
                var s=SC[sid];
                var isSel=bundleSelectedScaffolds.includes(sid);
                var isOpen=bundleOpenGrid===sid;
                var rc=bundleCellCount(sid);
                return RC('div',{key:sid,style:{border:'0.5px solid '+(isSel?s.h6:'#e0e0e0'),borderRadius:'10px',overflow:'hidden'}},
                  RC('div',{
                    style:{display:'flex',alignItems:'center',gap:'10px',padding:'10px 12px',background:isSel?s.h5:'#fff',cursor:'pointer'},
                    onClick:function(){
                      if(!isSel){
                        setBundleSelectedScaffolds(function(p){return [...p,sid];});
                        setBundleOpenGrid(sid);
                      } else {
                        setBundleOpenGrid(isOpen?null:sid);
                      }
                    }
                  },
                    RC('div',{style:{width:'18px',height:'18px',borderRadius:'4px',border:'1.5px solid '+(isSel?s.h6:'#ccc'),background:isSel?s.h6:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},
                      isSel&&RC('i',{className:'ti ti-check',style:{fontSize:'11px',color:'white'}})
                    ),
                    RC('span',{style:{fontSize:'13px',fontWeight:500,color:isSel?s.h8:'#111',flex:1}},s.name),
                    isSel&&RC('div',{style:{display:'flex',gap:'4px',flexShrink:0},onClick:function(e){e.stopPropagation();}},
                      RC('button',{
                        onClick:function(e){e.stopPropagation();setBundleKidView(function(v){return !v;});},
                        style:{fontSize:'10px',fontWeight:600,padding:'2px 8px',borderRadius:'5px',border:'1.5px solid '+(bundleKidView?s.h6:'#ddd'),background:bundleKidView?s.h5:'white',color:bundleKidView?s.h8:'#999',cursor:'pointer',whiteSpace:'nowrap',flexShrink:0}
                      },bundleKidView?'Educator view':'Student view')
                    ),
                    isSel&&rc>0&&RC('span',{style:{fontSize:'11px',color:s.h8,background:s.h1,borderRadius:'5px',padding:'1px 7px'}},rc+' cells selected'),
                    isSel&&RC('i',{className:'ti ti-chevron-'+(isOpen?'up':'down'),style:{fontSize:'14px',color:s.h6}})
                  ),
                  isSel&&isOpen&&RC('div',{style:{padding:'12px',borderTop:'0.5px solid '+s.h1,background:'#fff'}},
                    bundleKidView&&RC('div',{style:{background:s.h5,border:'0.5px solid '+s.h1,borderRadius:'6px',padding:'6px 10px',marginBottom:'8px',display:'flex',alignItems:'center',gap:'6px'}},
                      RC('i',{className:'ti ti-user',style:{fontSize:'12px',color:s.h8}}),
                      RC('span',{style:{fontSize:'11px',color:s.h8,fontWeight:500}},'Student view — showing "I can..." language for conversations with students')
                    ),
                    RC('p',{style:{fontSize:'11px',color:'#888',marginBottom:'10px'}},'Click a cell to select it. Click again to deselect.'),
                    RC(Grid,{sid:sid,sel:bundleGSel(sid),onSel:function(ci,v,a){bundleCSel(sid,ci,v,a);},kidView:bundleKidView})
                  )
                );
              })
            ),
            RC('div',{style:{display:'flex',gap:'8px',marginTop:'8px'}},

        :RC('div',null,
          assignments.slice().reverse().map(function(a){
            var entry=entries.find(function(e){return e.label===a.title;});
            var assignedIds=a.assignTo==='all'?classStudents.map(function(s){return s.id;}):a.selectedStudents.filter(function(sid){return classStudents.some(function(s){return s.id===sid;});});
            var total=assignedIds.length;
            var done=entry?assignedIds.filter(function(sid){return entry.data[sid]==='done';}).length:0;
            var pending=entry?assignedIds.filter(function(sid){return entry.data[sid]==='pending';}).length:0;
            var pct=total>0?Math.round((done/total)*100):0;
            return RC('div',{key:a.id,style:{marginBottom:'14px'}},
              RC('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'4px'}},
                RC('span',{style:{fontSize:'13px',fontWeight:500,color:'#1a1a1a'}},a.title),
                RC('div',{style:{display:'flex',gap:'10px',alignItems:'center'}},
                  RC('span',{style:{fontSize:'11px',color:BPL,fontWeight:600}},done+'/'+total+' done'),
                  RC('span',{style:{fontSize:'12px',fontWeight:700,color:pct===100?BPL:pct>50?'#555':'#ef4444'}},pct+'%')
                )
              ),
              RC('div',{style:{height:'10px',background:'#f0f0f0',borderRadius:'5px',overflow:'hidden',position:'relative'}},

                RC('div',{style:{position:'absolute',left:0,top:0,height:'100%',width:(done/total*100)+'%',background:BPL,borderRadius:'5px'}})
              )
            );
          })
        )
    )
  );
}

                var scaffoldKeys=Object.keys(scaffoldSet);
                var itemLabels=bundle.items.map(function(key){
                  if(key.startsWith('work::')){
                    var wId=key.replace('work::','');

                var allItemLabels=itemLabels;
                // Use ratings scored directly in the bundle form
                var ratings=bundle.ratings||{};
                // Fall back to scaffold keys from work items if no ratings provided

                  scaffoldKeys.forEach(function(k){ratings[k]={};});

                // Determine if sender is a subject teacher (not the student's advisor)
                var stuAdvisorId=selStu.advisorId;

            RC('i',{className:'ti ti-'+(fnListening?'ear':'microphone'),style:{fontSize:'16px'}}))
        ),

        ),
